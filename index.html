<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sena Portfolyo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Mali:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="profile-img-container">
                <img src="profil.jpg" alt="Profil Fotoğrafı" class="profile-img">
            </div>
            <h1>🎀 Portfolyoma Hoş Geldin! 🎀</h1>
        </header>

        <main>
            <div class="rabbit-section">
                <div class="interaction-area" style="position: relative;">
                    <div class="animated-hand hidden" id="animatedHand">🙌</div>
                    <div class="rabbit" id="rabbit">
                        <div class="ears"><div class="ear left"></div><div class="ear right"></div></div>
                        <div class="head">
                            <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
                            <div class="nose"></div>
                            <div class="mouth"></div>
                        </div>
                    </div>
                    
                    <div class="controls">
                        <button class="kawaii-btn" onclick="petRabbitAnimation()">💕 Tavşanı Sev</button>
                        <div class="carrot-prop" id="draggableCarrot" draggable="true">🥕</div>
                    </div>
                </div>
            </div>

            <div class="links-section hidden" id="linksSection">
                <div class="links-container">
                    <a href="gorev2/index.html" class="project-link">🎬 Görev 2</a>
                    <a href="gorev7/grafik.png" class="project-link">📊 Görev 7 Grafik</a>
                    <a href="gorev7/veriler.csv" class="project-link">📂 Görev 7 CSV</a>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
