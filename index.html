<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sena'nın Kawaii Profili</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Mali:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="profile-img-container">
                <img src="profile.jpg" alt="Profil Fotoğrafı" class="profile-img">
            </div>
            <h1>🎀 Portfolyoma Hoş Geldin! 🎀</h1>
            <p>Harika projelerimi görmek için pofuduk dostumuzla ilgilenmelisin.</p>
        </header>

        <main>
            <div class="rabbit-section">
                <div class="instruction">
                    <p>Linklere ulaşmak için tavşanı <b>sev</b> veya havucu <b>sürükleyerek yedir</b>! 🐰</p>
                </div>
                
                <div class="interaction-area" style="position: relative;">
                    <div class="animated-hand hidden" id="animatedHand">🙌</div>
                    <div class="rabbit" id="rabbit">
                        <div class="ears">
                            <div class="ear left" id="earLeft"></div>
                            <div class="ear right" id="earRight"></div>
                        </div>
                        <div class="head">
                            <div class="eyes">
                                <div class="eye" id="eyeLeft"></div>
                                <div class="eye" id="eyeRight"></div>
                            </div>
                            <div class="nose"></div>
                            <div class="mouth" id="mouth"></div>
                            <div class="blush-left"></div>
                            <div class="blush-right"></div>
                        </div>
                        <div class="body-rabbit"></div>
                        <div id="heart" class="heart hidden">💖</div>
                        <div id="eating-crumbs" class="eating-crumbs hidden">✨🍓</div>
                    </div>
                    
                    <div class="controls">
                        <button class="btn kawaii-btn" onclick="petRabbitAnimation()">💕 Tavşanı Sev </button>
                        <div class="draggable-carrot-container">
                            <div class="carrot-prop" id="draggableCarrot" draggable="true">🥕</div>
                            <span class="drag-hint">Havucu üstüne sürükle 👆</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="links-section hidden" id="linksSection">
                <h2>🌟 Linklere Ulaştınız 🌟</h2>
                <div class="links-container">
                    <a href="file:///C:/Users/SENA ÇİFÇİ/pembe-netflix-projesi/index.html" class="project-link" target="_blank">
                        🎬 Pembe Netflix Uygulaması
                    </a>
                    <a href="file:///C:/Users/SENA ÇİFÇİ/yks-veri-seti/yks_dagilim_grafigi.png" class="project-link" target="_blank">
                        📈 YKS Grafiği İncele
                    </a>
                    <a href="file:///C:/Users/SENA ÇİFÇİ/yks-veri-seti/yks_ve_liseler_veriseti.csv" class="project-link" target="_blank">
                        📊 YKS Veri Seti (İndir)
                    </a>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
