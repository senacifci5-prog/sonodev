        const rawData = { "kflm": [{ "title": "Athena: Goddess of War", "image": "https://static.tvmaze.com/uploads/images/original_untouched/8/20678.jpg", "desc": "A terrorist group known as Athena and led by evil mastermind Son Hyuk threatens South Korea and the world. It is now up to special agent Lee Jung Woo of the National Security Agency to foil their terrifying conspiracy. Jo Soo Young, the daughter of the South Korean president, is kidnapped and hidden away in Italy. Jung Woo and his team are given the assignment to find her and bring her back." }, { "title": "IRIS", "image": "https://static.tvmaze.com/uploads/images/original_untouched/90/226597.jpg", "desc": "Two elite National Security System (NSS) agents, Hyung Jun and Sa Woo who were sworn blood brothers, both fall for fellow agent Seung Hee. Sa Woo attempts to suppress his feelings for Seung Hee and wishes the couple the best." }, { "title": "3 Days", "image": "https://static.tvmaze.com/uploads/images/original_untouched/63/158846.jpg", "desc": "A drama about a case that occurs in three days between secret service agents in the Blue House. The South Korean President travels to a villa to enjoy his vacation. After three gunshots are fired, he disappears. His bodyguard Han Tae Kyung attempts to find the President." }, { "title": "Air City", "image": "https://static.tvmaze.com/uploads/images/original_untouched/221/554744.jpg", "desc": "There is a national border that links the Korean peninsula to countries all over the world. Incheon International Airport. Tens of thousands of passengers, thousands of tons of freight, and hundreds of airplanes that take off and land at this place. With 30,000 airport employees working to keep the airport open 24 hours a day, the place even has its own mini government as 21 government agencies are located on the airport premises. Airport is more than just an airport: It is a small city. Just like how one airplane part is essential to the safety of the whole flight, every single person who works at Incheon Airport plays an important role in handling the airplane take-offs and landings. Air City is a story about these dedicated people." }, { "title": "Orange Marmalade", "image": "https://static.tvmaze.com/uploads/images/original_untouched/13/33758.jpg", "desc": "Baek Ma Ri is a senior high student who is also a vampire. She attends for school which all the students are human but she's a vampire. She has to keep her real identity hidden and acts like a common girl. But deep inside, she holds the grudge for all people around her talking fuss and mocking about vampires. Meanwhile, Jung Jae Min is a popular male student who will fall in love with Baek Ma Ri." }, { "title": "King Gwanggaeto the Great", "image": "https://static.tvmaze.com/uploads/images/original_untouched/13/34171.jpg", "desc": "A drama detailing the life of King Gwanggaeto the Great, who restored the glory of Goguryeo by wresting power back from Baekje, which had invaded Goguryeo prior to Gwanggaeto's birth and dominated East Asia under the rule of King Geunchogo." }, { "title": "The Lover", "image": "https://static.tvmaze.com/uploads/images/original_untouched/82/206910.jpg", "desc": "Oh Jung Se and Ryu Hyun Kyung play the main couple in their 30s who chose to live together instead of getting married, and have been sharing an apartment for two years. Oh Jung Se plays a voice actor and Ryu Hyun Kyung plays a reviewer who runs a blog.Choi Yeo Jin and Jung Joon Young have been cast as the second couple \u2014 they're twelve years apart in age and have been living together for a year. He's a pretty-boy singer who carries his guitar everywhere he goes, but doesn't actually know how to play it all that well. She's a penny-pinching ajumma in the body of a hot woman who basically supports her much younger boyfriend. He drives her crazy but he's a good guy at heart, and she can never manage to stay mad at him for long. Ha Eun Sul and Park Jong Hwan play a 20s couple that just moved in together. She's the type of woman who doesn't want her boyfriend to know th" }, { "title": "You Are the Best!", "image": "https://static.tvmaze.com/uploads/images/original_untouched/585/1464423.jpg", "desc": "Because of her father's sudden death, Lee Soon Shin and her mother fall in trouble. They both attempt to find happiness, while Lee Soon Shin falls in love.Meanwhile Shin Joon Ho is the president of an entertainment management company. He is over confident, arrogant and cold-blooded. By meeting Lee Soon Shin, he realizes the meaning of true success and also changes." }, { "title": "Immortal Lee Soon Shin", "image": "https://static.tvmaze.com/uploads/images/original_untouched/14/36173.jpg", "desc": "Based on Kim Hoon's Song of The Sword and Kim Tak Hwan's Immortality, KBS's outstanding 2005 historical drama The Immortal Lee Soon Shin is one of the most ambitious works the genre has seen in years. Spanning 104 episodes, the drama tells the story of one the world's greatest naval heroes, Admiral Lee Soon Shin, and all the people who helped him become a beloved figure in Korean history. The show was produced by Lee Seong Ju, who won Best Producer at the 2005 Baeksang Awards, and went on to record ratings of over 30%. The Immortal Lee Soon Shin received the Best of Best Drama Award and the Best Talent Award (Kim Myung Min) at the 33rd Korean Broadcasting Awards." }, { "title": "Comrades", "image": "https://static.tvmaze.com/uploads/images/original_untouched/14/36176.jpg", "desc": "This drama commemorates the soldiers who gave their lives in the Korean War, fought between North and South Korea between 1950 and 1953, and is designed to remind people that the heavy cost of human lives far outweigh any national glory. Lee Hyun Joong is a South Korean squad commander and war veteran who is dedicated to protecting the lives of the soldiers serving under him, despite his jaded outlook. His chance meeting with Lee Tae Ran on the battlefield stirs memories of the past, but she is now a lieutenant of the North Korean army." }, { "title": "Golden Cross", "image": "https://static.tvmaze.com/uploads/images/original_untouched/14/36944.jpg", "desc": "Employee's net incomes are getting lower and lower but their employer's salaries increases every year. In the age of rough economy, we are forced to believe prospective economy in the future. Then one day, if someone lures you for dirty money, what would you do?" }, { "title": "Shark", "image": "https://static.tvmaze.com/uploads/images/original_untouched/14/37199.jpg", "desc": "Han Yi Soo who wants to gain omnipotent power to take revenge for his family and he finally points his dagger to a lady he loves. Jo Hae Woo learns about Yi Soo's ugly truth about his family but she cannot stop loving him. This story is about agonizing love and tragic life of a man and a woman." }, { "title": "The Virus", "image": "https://static.tvmaze.com/uploads/images/original_untouched/14/37201.jpg", "desc": "This drama centers around the scientists at the \u2018special infectious disease crisis response team\u2018 lead by Lee Myung Hyun, who investigate a mysterious infection case where the virus has a 100% fatality rate." }, { "title": "A Man Called God", "image": "https://static.tvmaze.com/uploads/images/original_untouched/562/1406773.jpg", "desc": "Raised in America, government agent Choi Kang Ta returns to Korea with the skills of an assassin and a thirst for revenge on his father's killers." }, { "title": "That Winter, the Wind Blows", "image": "https://static.tvmaze.com/uploads/images/original_untouched/532/1331191.jpg", "desc": "Oh Young is a blind heiress to a large corporation who lost her parents in a tragic accident along with her sight. Meanwhile, Oh Soo is a gambler and playboy who lives in a meaningless life after being abandoned by his parents at an early age as well as his first love. In order to repay the enormous amount of debt, Oh Soo approach Oh Young for money purpose but ends up falling in love with her\u2026" }, { "title": "Last", "image": "https://static.tvmaze.com/uploads/images/original_untouched/56/142149.jpg", "desc": "When a critical business deal goes belly up, Jang Tae Ho finds himself homeless and on the run from dangerous loan sharks. As the once-successful financier struggles to climb his way out of poverty, he encounters an underground community within the subway system, where an entirely different set of rules govern the lives of countless homeless denizens." }, { "title": "Bad Guys", "image": "https://static.tvmaze.com/uploads/images/original_untouched/135/338406.jpg", "desc": "To combat rising violent crimes, the Police Chief asks Detective Oh Goo Tak to form a team consisting of criminals. He is currently suspended from the police force for using excessive force. He then gathers team members: Park Woong Chul who is a gangster, Lee Jung Moon who is the youngest serial killer with extraordinary intelligence and Jung Tae Soo who is a contract killer. Police Inspector Yoo Mi Young also joins the team and she tries to have these guys work as a team by dealing with them rationally and sometimes emotionally." }, { "title": "Road No.1", "image": "https://static.tvmaze.com/uploads/images/original_untouched/15/38392.jpg", "desc": "Based on the events occurring around \"Route 1\", which lies between Seoul and Pyongyang. The story about Officer Lee Jang Woo who finds himself in a war that he is not prepared for in order to protect Soo Yeon, the woman he has known and loved since youth. However, he is able to put it past him and he displays extraordinary survival skills, friendship, cooperation and ideology under brutal war conditions. Soo Yeon awaits Jang Woo's return, but eventually gets engaged to Tae Ho. When Jang Woo returns alive, however, Tae Ho discovers Jang Woo and Soo Yeon's unbreakable bond and feels betrayed." }, { "title": "Triangle", "image": "https://static.tvmaze.com/uploads/images/original_untouched/15/38398.jpg", "desc": "Three brothers lose their parents and grow up separately without knowing the whereabouts of each other for more than 20 years. Because they have taken on new names and are all grown up, they are unable to recognize each other later on. Jang Dong Soo the oldest brother become a detective, while Dong Chul the middle brother uses an alias name Heo Young Dal to become the boss of a crime gang. The youngest, Dong Woo, grows into a cold person after being adopted by a rich family. The three brothers fates become intertwined as they become bitter adversaries." }, { "title": "Heartless City", "image": "https://static.tvmaze.com/uploads/images/original_untouched/15/38403.jpg", "desc": "A drama revolves around the struggle between undercover agents and members of an infamous drug ring, and the love interests of the three main characters that emerge in the process." }, { "title": "Secret Love", "image": "https://static.tvmaze.com/uploads/images/original_untouched/529/1323603.jpg", "desc": "Everyone has their own secrets. Secrets can help people succeed and even fall in love; but secrets can also destroy people. Secrets can sometimes make us happy, worried, or even blind us to reality. This drama is about secrets. It is an exploration into the trials and tribulations of people who live with secrets. These secrets drive the four characters desire to find love and exact revenge." }, { "title": "President", "image": "https://static.tvmaze.com/uploads/images/original_untouched/15/38429.jpg", "desc": "Three months before the presidential nominating convention, Jang Il Joon, from the New Wave Party, declared his candidacy. On that same day, a woman died in a gas explosion in Sam Chuk. Yoo Min Ki, a documentary producer, heard of his mother's sudden death and headed back home. As he cast his mother's ashes in the sea, he thought of his childhood: his father always blurted out that Min Ki was not his son whenever he was drunk. After the funeral, Min Ki returned to Seoul and Jang Il Joon asked Min Ki to work as a PR agent to record the election campaign process. When Min Ki asked Il Joon why he was chosen, Il Joon confessed that Min Ki was his son. Min Ki soon begins to suspect that his mother's death was not an accident and that Il Joon had actually killed her." }, { "title": "You're Beautiful", "image": "https://static.tvmaze.com/uploads/images/original_untouched/506/1267450.jpg", "desc": "The management company of the idol group A.N.JELL insisted on adding a new singer to the group as the lead vocal, Tae Kyung's voice was hurting. However,the new member, Mi Nam, had to go to the States to repair a botched eye job just before signing the contract. His agent came up with the idea of having his twin sister, Mi Nyu,to stand in for him and pretend that she was her brother. The two of them grew up in an orphanage and Mi Nyu, who was all set to become a nun, agreed to this charade as she didn't want to spoil her brother's chance of fame which would make it easier to look for their mother." }, { "title": "Bridal Mask", "image": "https://static.tvmaze.com/uploads/images/original_untouched/15/38709.jpg", "desc": "Bridal Mask is a famous manhwa set in the 1930s during the Japanese occupation. The hero, Lee Kang-to, is known as 'Gaksital' because he wears a mask to hide his face \u2014 one of those traditional play masks, specifically the rosy-cheeked one reserved for the female role, aka the bride. He's an unassuming young man in real life, but when he dons his superhero mask, he fights injustice and rights wrongs during one of the darkest periods of Korea's history." }, { "title": "Yellow Boots", "image": "https://static.tvmaze.com/uploads/images/original_untouched/15/38913.jpg", "desc": "A drama about the revenge of a woman who lost everything after being framed for a crime." }, { "title": "Yaksha", "image": "https://static.tvmaze.com/uploads/images/original_untouched/15/38914.jpg", "desc": "Set in a tumultuous period where the political scene is murky and various people fought to gain power and the throne, the young king will do anything to strengthen his shaky position in court. His childhood friend Baek Rok leads a secret military force loyal to the king, called the \"Black Cloud Swords.\" Baek Rok lives for his king, his brother Baek Kyul and his lover Jung Yeon, but when his ambitious brother betrays him and leads him into a trap, he finds himself on the run. He becomes a slave and gladiator, eventually returning to Joseon to seek revenge." }, { "title": "Friend, Our Legend", "image": "https://static.tvmaze.com/uploads/images/original_untouched/44/110834.jpg", "desc": "Friend, Our Legend is a drama adaptation of the 2001 gangster classic film \"Friend\" both by the same director, Kwak Kyung Taek. This drama is a gritty, brilliant, star-studded tale of four childhood friends who grow up to become enemies and bitter rivals. Hyun Bin plays a hardened mobster; a role legendized by Jang Dong Gun in the film." }, { "title": "Hwajung", "image": "https://static.tvmaze.com/uploads/images/original_untouched/15/39517.jpg", "desc": "This interpretation tells of Gwanghae as the son of a concubine and secondary heir, who in his thirst for power, usurps the Crown and ousts his half-sister Jungmyung from the palace. Gwanghae is then deposed in a coup by the Westerners, who replace him with Injo. Extremely paranoid and wanting to stabilise his position, he is also out for Jungmyung's life." }, { "title": "Non-Summit", "image": "https://static.tvmaze.com/uploads/images/original_untouched/15/39519.jpg", "desc": "Non-Summit (aka Abnormal Summit) is a television program on JTBC in South Korea. The show features a panel of eleven non-Korean men, living in Korea, who debate on various topics and \"Korean culture, through the eyes of a foreigner,\" in a talk show format, in the Korean language" }, { "title": "The Greatest Marriage", "image": "https://static.tvmaze.com/uploads/images/original_untouched/43/109409.jpg", "desc": "Cha Ki Young was once a successful news anchor living the good life, but everything changed when she defied expectations and became a single mother. Jo Eun Cha was also once a news anchor, but left his career to campaign unsuccessfully for office. Though nothing quite pans out as expected for either Ki Young or Eun Cha, they've yet to discover what fate has in store for them. Meanwhile, four other couples grapple with whether or not they can really have it all in modern romance." }, { "title": "The Genius", "image": "https://static.tvmaze.com/uploads/images/original_untouched/16/40419.jpg", "desc": "A reality series pitting people identified with \"genius traits\" against one another in social games of strategy, logic, and negotiation skills. Each episode consists of a main match and a death math. The main match decides the winner and elimination candidate for the day. The winner receives a token of life, which grants immunity from the death match, and potentially garnets, a game currency worth \u20a91,000,000 each. Garnets can be used to improve a player's chances of winning a game, as well as be traded with other players to gain favor. The elimination candidate chooses a player without a token of life to take part in a 1v1 game called the death match. The player who loses the death match is eliminated, and the winner of the death match gains their garnets. The last remaining player is the champion, and the total garnets held by the champion will be the final prize." }, { "title": "Twenty Again", "image": "https://static.tvmaze.com/uploads/images/original_untouched/464/1162378.jpg", "desc": "Due to an unplanned pregnancy, Ha No Ra married young and dropped out of school. But after two decades as a housewife, she finally gets the chance to experience college, alongside her 20-year-old son Kim Min Soo and his girlfriend Oh Hye Mi. Further complicating things, No Ra already has a strained student-teacher relationship, as her husband Kim Woo Chul and her first love Cha Hyun Suk wind up being her professors." }, { "title": "Bicheonmu", "image": "https://static.tvmaze.com/uploads/images/original_untouched/61/153154.jpg", "desc": "This drama will depict a serious love story. These days love is taken for granted and the purity of love is often secondary on the list. However, for anyone that has experienced true love they will understand the depths and to-the-core experience love can bring. Some will risk their lives, while others will walk away\u2026 The Dance In The Sky revolves around the story of love and revenge between four characters. Some will undergo great sacrifice for their love, some will fight to the death, and some will seek revenge." }, { "title": "The Master's Sun", "image": "https://static.tvmaze.com/uploads/images/original_untouched/523/1308451.jpg", "desc": "The story revolves around a woman who can see ghosts and a man who tries to protect her, and is described as a drama with horror and romantic elements infused together. So Ji Sub plays the miserly, greedy, and conceited CEO Joo Joong Won, who measures all human relationships through money. Gong Hyo Jin will play the melancholy and tearful assistant Tae Gong Shil, who is able to see ghosts after an accident and thus suffers from insomnia. She lives a very reclusive and closed-off life due to her ability. The story is being touted as \"soul healing\" drama that brings together very different types of people: one who can see and hear things that no one else in the world can and another who only hears and see things he wants too. As Joo Joong Won starts to believe in Tae Gong Shil's claim of being able to see ghosts, these two people will grow together in faith and in character." }, { "title": "Rooftop Prince", "image": "https://static.tvmaze.com/uploads/images/original_untouched/585/1462711.jpg", "desc": "A prince from the Joseon era, Lee Gak, is catapulted 300 years forward into the future in Seoul 2012 with his entourage, which includes Song Man Bo, Do Chi San and Woo Young Sul, when he tries to investigate the suspicious circumstances which surround the death of the girl he loved. In the present, he finds a girl who looks exactly like his beloved crown princess..." }, { "title": "Yong Pal", "image": "https://static.tvmaze.com/uploads/images/original_untouched/17/43314.jpg", "desc": "Kim Tae Hyun is a promising young surgeon, but his finances take a dive when his sister's health condition requires costly dialysis treatments. When Tae Hyun subsequently falls into a vicious cycle of debt, he assumes the alias of \"Yong Pal\" and begins making house calls for criminals who are willing to pay top dollar. Complicating things further, Tae Hyun gets involved with Han Yeo Jin, a comatose patient at the hospital." }, { "title": "Late Night Restaurant", "image": "https://static.tvmaze.com/uploads/images/original_untouched/17/43322.jpg", "desc": "In a small restaurant, which is only open after midnight, a chef known as 'Master' doesn't offer any menus, but is willing to whip up any dish his patrons desire. Every night, the mysterious Master dedicates himself to comforting the woes of his customers, including a gangster, a down-and-out actor, office ladies, a paper boy, and a night worker. Despite the restaurant's unconventional hours and rules, these denizens of the night still keep coming back for more." }, { "title": "I Remember You", "image": "https://static.tvmaze.com/uploads/images/original_untouched/144/361653.jpg", "desc": "A passionate detective with a strong track record has been investigating a mysterious former FBI profiler for a long while. They both somehow end up in the same investigation crime team which sparks their romance." }, { "title": "My Fair Lady", "image": "https://static.tvmaze.com/uploads/images/original_untouched/525/1312523.jpg", "desc": "Of the high-rolling top 'hot celebrities' of the wealthy upper class in Korea's high society, Kang Hye Na is the one desired by the men, feared and hated by the women. Being the only successor to the largest conglomerate company, Kang San Group, Kang Hye Na has both the looks and the background. She is the owner of the \u2018Lady Castle' and lives a \u2018princess-like' life with her servants.<br />Until one day, out of pure coincidence, she comes across Seo Dong Chan who turns her life upside down. Not only does he make her do community service, he even kidnapped her... and now he's the new household manager!!! Even after stepping on him, crushing him and biting him, he still doesn't run away. She may have finally met her match..." }, { "title": "Korean Peninsula", "image": "https://static.tvmaze.com/uploads/images/original_untouched/17/43346.jpg", "desc": "In a time somewhere in the future, North and South Korea have joined to form a unified Korean Peninsula. Suh Myung Joon is the president of this newly-formed, fragile country. He strives to protect the alliance when the two sides begin a vicious battle over the country's natural resources. In this endeavour he's supported by his beautiful wife Rim Jin Jae, and finds a rival in NIS agent Kang Dong Won." }, { "title": "The Greatest Love", "image": "https://static.tvmaze.com/uploads/images/original_untouched/459/1149924.jpg", "desc": "A romantic comedy about a former star singer named Koo Ae-jeong who finds herself entangled in a relationship with Dokgo Jin, the biggest celebrity in the country." }, { "title": "Mom", "image": "https://static.tvmaze.com/uploads/images/original_untouched/17/43353.jpg", "desc": "For years, parents made sacrifices to raise their children. And those children usually became good, grateful kids. But that has changed in today's society, where parents have become bitter and disappointed with their children's attitudes. Quite a few children resent their elderly parents who have become a burden to them. More parents are realizing that they have made a grave mistake in their parenting. Now these parents are planning to lead a different kind of life from the generation that came before them. The empty gratitude they receive for giving the best to their kids is no longer acceptable. That explains the growing, unseen social phenomenon of strife between parents and their children. But it is a real, existing problem. This TV miniseries follows the drama of a mother who decides to get back at her children who are disinterested in devoting their affection, time and money on her but are resolutely expecting an inheritance. Who will be the winner in such a battle between parent and children? And will there even be a winner in this revenge drama? The show will stay upbeat with touching moments that will reach a conclusion where two different generations resolve their problems through understanding each other's deepest emotions." }, { "title": "The Scholar Who Walks the Night", "image": "https://static.tvmaze.com/uploads/images/original_untouched/464/1162377.jpg", "desc": "In Joseon Dynasty, immaculately dressed in scholarly robes, the young nobleman Kim Sung Ryul lives as a vampire to keep his promise to his friends. When Sung Ryul still was a human, he found out about the vampire Gwi who sits above the King deciding the next royal line and has resurrected as a vampire trying to fight against Gwi. And now, he is living as a guardian vampire fighting against the evil vampire without losing his human nature." }, { "title": "My Daughter, Geum Sa Wol", "image": "https://static.tvmaze.com/uploads/images/original_untouched/396/990371.jpg", "desc": "In our society, extramarital affairs have become so prevalent that it is now one of the major social ills that we face today. Conflict, lies, and betrayals have reached a breaking point in quite a few marriages. Now it is time for people to impassively consider how extramarital affairs affect the children. Children should be cherished in a family and not used as pawns in bitter divorce proceedings or other revenge schemes. There could be nothing worse than that. This TV miniseries takes a look at how families are destroyed and in the process, identifies who are responsible for it. How are bonds between parents and children severed and how they can be reunited will be part of the main plot. While the show's characters will seemingly spiral downward endlessly, viewers need to focus on the original sin that wrought all the chaos in the first place.<br />In the process of exacting revenge and as a result of narcissistic and selfish behavior, one child was born out of wedlock. In the end, the guilty party must take responsibility for his or her sins.<br />Building houses becomes an important metaphor for forgiveness and rehabilitation. The act of homebuilding is a yearning for family and a path towards rebuilding a dwelling for a family. For many single people who live alone in the city, the show's homebuilding theme could instill a vicarious feeling of being with family." }, { "title": "Warm and Cozy", "image": "https://static.tvmaze.com/uploads/images/original_untouched/464/1162336.jpg", "desc": "A man and a woman relocate to Jeju Island to get away from the harsh city life." }, { "title": "A Daughter Just Like You", "image": "https://static.tvmaze.com/uploads/images/original_untouched/65/163842.jpg", "desc": "This family-oriented show revolves around three different families clashing through a lot of misunderstandings as they become in-laws with each other: a popular female host on a shopping channel and her three daughters who are a college professor, high-powered consultant and doctor, a divorced spouse who loves to regale stories about his time in the Marines, he has dried skin from doing the dishes every day; and a daughter from a rich family that that runs a successful fashion designer company. Their problems clear up slowly through love and understanding that result in a healing process." }, { "title": "Eve's Love", "image": "https://static.tvmaze.com/uploads/images/original_untouched/116/290917.jpg", "desc": "Three women share a close bond that was deeper than any friendship. Song Ah, Se Na, and Hyun Ah were both the same age and went to the same schools. Song Ah was an especially giving friend who would do anything for a friend. She absolutely trusted Se Na and treated her like a sister along with her twin sister Hyun Ah. She thought they would always maintain a close relationship. But she had no idea that Se Na was planning revenge." }, { "title": "Angry Mom", "image": "https://static.tvmaze.com/uploads/images/original_untouched/17/43474.jpg", "desc": "Jo Kang Ja used to be known as a bad ass when she attended high school, but became more responsible when she gave birth to her daughter Ah Ran in her late teens. When Ah Ran is grown up and currently attending high school, she is bullied. Jo Kang Ja decides to return to high school as a student again in order to protect her daughter from those bullies." }, { "title": "Flower of the Queen", "image": "https://static.tvmaze.com/uploads/images/original_untouched/538/1345857.jpg", "desc": "Rena Jung is a beautiful, but ambitious star chef who hosts her own cooking show. Her husband, Park Min Joon, is the first son of a family that runs a large company. Their relationship is not so good, but they try to show other people they are still in love.In the past, Rena Jung abandoned her daughter for a chance at success. Now, her daughter, Kang Yi Sol appears in front of her. Kang Yi Sol resents her mother for abandoning her.Park Jae Joon is the husband's younger brother. He is popular with women, but he is attracted to Kang Yi Sol." }, { "title": "Shine or Go Crazy", "image": "https://static.tvmaze.com/uploads/images/original_untouched/81/204099.jpg", "desc": "Wang So, a Goryeo prince, was born with the name, \"Shine\". Shin Yul is a woman hailing from the Balhae kingdom and believed to have the powers of an oracle. A prince who suffered vile remarks because of a cursed prophecy finds himself attracted to a former princess from a fallen kingdom who faces death because of her fate to become the light of another kingdom. Their love is at a point of either shining or flaming out." }], "anim": [{ "title": "Hellsing", "image": "https://static.tvmaze.com/uploads/images/original_untouched/178/446544.jpg", "desc": "Hellsing is a 13-part anime based on the manga of the same name. The plot is significantly difficult to that of the the manga although the characters are the same. The show mainly focuses on the hellsing institute that houses the anti-hero named Alucard who swore loyalty to the Helsing family many years before. Alucard being the first ever vampire takes on a new apprentice named Sera's." }, { "title": "Hellsing Ultimate", "image": "https://static.tvmaze.com/uploads/images/original_untouched/178/446780.jpg", "desc": "Hellsing Ultimate, unlike the 13-part Hellsing series, follows the manga of the same name very closely. Alucard being the main protagonist and anti-hero/vampire. Hellsing Ultimate is a 10-part series of OVAs whereby Alucard turns Sera's into a vampire. The main focus of the plot being on an enemy neo-nazi group." }, { "title": "Berserk", "image": "https://static.tvmaze.com/uploads/images/original_untouched/396/991619.jpg", "desc": "Berserk is a 25-part anime set in a dark fantasy/horror environment whereby the series focuses on the main character guts; a lone swordman who later meets up with a group of mercenaries called the band of the hawk. The leader of this band holds a strange necklace called a behelit that will only lead to evil." }, { "title": "Death Note", "image": "https://static.tvmaze.com/uploads/images/original_untouched/499/1249019.jpg", "desc": "Death Note is an anime series based around a manga of the same name whereby a human finds a death god's notebook. Any person's name written in this notebook will die. The main character who finds this noteboook is Light Yagami who faces off against an unfaced character named L who tries to challenge him." }, { "title": "The Simpsons", "image": "https://static.tvmaze.com/uploads/images/original_untouched/588/1471731.jpg", "desc": "The Simpsons is the longest running scripted show in US television history. It captures the adventures of Homer, Marge, Maggie, Bart and Lisa who are living in a fictional town called Springfield." }, { "title": "Family Guy", "image": "https://static.tvmaze.com/uploads/images/original_untouched/609/1523259.jpg", "desc": "Family Guy follows Peter Griffin the endearingly ignorant dad, and his hilariously offbeat family of middle-class New Englanders in Quahog, RI. Lois is Peter's wife, a stay-at-home mom with no patience for her family's antics. Then there are their kids: 18-year-old Meg is an outcast at school and the Griffin family punching bag; 13-year-old Chris is a socially awkward teen who doesn't have a clue about the opposite sex; and one-year-old Stewie is a diabolically clever baby whose burgeoning sexuality is very much a work in progress. Rounding out the Griffin household is Brian the family dog and a ladies' man who is one step away from AA." }, { "title": "Bob's Burgers", "image": "https://static.tvmaze.com/uploads/images/original_untouched/589/1474468.jpg", "desc": "The series follows Bob who runs Bob's Burgers, with the help of his wife and their three kids. Bob has big ideas about burgers, but the rest of the clan falls short on service. Despite the greasy counters and lousy location, the Belchers are determined to make every \"Grand Re-Re-Re-opening\" a success. Bob's wife, Linda, stands by her man and often does so by bursting into song. Their eldest daughter, 13-year-old Tina has a slight obsession with boys and zombies. Middle child Gene is an aspiring musician with a thirst for life. Louise is the bunny ears-wearing youngest daughter with an off-kilter sense of humor that makes her somewhat of a liability in the kitchen \u2013 and with the public." }, { "title": "South Park", "image": "https://static.tvmaze.com/uploads/images/original_untouched/594/1485766.jpg", "desc": "South Park is an adult comedy animation show centred around 4 children in the small town of south park. Its humour is often dark involving satirical elements and mocking current real-life events." }, { "title": "King of the Hill", "image": "https://static.tvmaze.com/uploads/images/original_untouched/592/1480199.jpg", "desc": "King of the Hill follows the life of Hank Hill, his wife Peggy, their 13-year-old son Bobby, their 18-year-old niece Luanne, her husband Lucky, their newborn baby girl Gracie and his beer guzzling neighborhood buddies, Dale, Bill and Boomhauer." }, { "title": "Star Wars: Rebels", "image": "https://static.tvmaze.com/uploads/images/original_untouched/353/884619.jpg", "desc": "Star Wars Rebels, set five years before the events of Star Wars: Episode IV - A New Hope, tells the story of the Rebellion's beginnings while the Empire spreads tyranny through the galaxy." }, { "title": "The Legend of Korra", "image": "https://static.tvmaze.com/uploads/images/original_untouched/260/650489.jpg", "desc": "Avatar Korra fights to keep Republic City safe from the evil forces of both the physical and spiritual worlds." }, { "title": "BoJack Horseman", "image": "https://static.tvmaze.com/uploads/images/original_untouched/405/1012627.jpg", "desc": "Meet the most beloved sitcom horse of the '90s, 20 years later. He's a curmudgeon with a heart of... not quite gold... but something like gold. Copper?" }, { "title": "American Dad!", "image": "https://static.tvmaze.com/uploads/images/original_untouched/611/1528249.jpg", "desc": "In American Dad!, Stan Smith leads the all-American family in this animated sitcom filled with wild and crazy extremes. Everyday life is taken to the limit as Stan applies the same drastic measures used in his job at the CIA to his home life. Driven by machismo and the American dream, he often is blind to how horribly he fails at his attempts. This father might not know best, but he never stops trying." }, { "title": "Rick and Morty", "image": "https://static.tvmaze.com/uploads/images/original_untouched/477/1194843.jpg", "desc": "Rick is a mentally gifted, but sociopathic and alcoholic scientist and a grandfather to Morty; an awkward, impressionable, and somewhat spineless teenage boy. Rick moves into the family home of Morty, where he immediately becomes a bad influence." }, { "title": "Black Dynamite", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/4742.jpg", "desc": "Dynamite is a 1970s renaissance man with a kung-fu grip. A lover and a fighter who is not afraid to leap before he looks. His sidekick extraordinaire is Bullhorn, the brains and cunning that complements Black Dynamite's hard-hittin', bone-crushin' style. Providing comic relief on the mean streets is Cream Corn and classing up the place is the gorgeous Honey Bee." }, { "title": "Brickleberry", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/4787.jpg", "desc": "Brickleberry follows the hapless rangers at Brickleberry National Park as they do their worst to keep the park open. Having been through everything from \"Steve's\" invention of Squabbits to the birth of the anti-Christ, the rangers are back and ready for anything." }, { "title": "Adventure Time", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/4898.jpg", "desc": "Adventure Time's unlikely heroes Finn and Jake are buddies who traverse the mystical Land of Ooo and encounter its colorful inhabitants." }, { "title": "The Venture Bros.", "image": "https://static.tvmaze.com/uploads/images/original_untouched/2/5028.jpg", "desc": "The Venture Bros. is an American animated television series that premiered on Cartoon Network's Adult Swim on February 16, 2003. The series mixes action and comedy together while it chronicles the adventures of the Venture family: well-meaning but incompetent teenagers Hank and Dean Venture; their emotionally insecure, ethically challenged super-scientist father Dr. Thaddeus \"Rusty\" Venture; the family's bodyguard, originally the ultra-violent and macho secret agent Brock Samson and his later replacement, reformed super villain and \"cured\" pedophile Sergeant Hatred; and the family's self-proclaimed arch-nemesis, the Monarch, a butterfly-themed super villain." }, { "title": "Archer", "image": "https://static.tvmaze.com/uploads/images/original_untouched/475/1188095.jpg", "desc": "Archer is an animated, half-hour comedy set at the International Secret Intelligence Service, a spy agency where espionage and global crises are merely opportunities for its highly trained employees to confuse, undermine, betray and royally screw each other." }, { "title": "TripTank", "image": "https://static.tvmaze.com/uploads/images/original_untouched/2/5459.jpg", "desc": "TripTank showcases animated shorts so volatile that they should come with a recommended dosage. Combining a range of animation styles and diverse talent, including Wayne Brady, Kumail Nanjiani and Zach Galifianakis, the show promises to offer all the euphoria of a potent hallucinogen without any of the puking." }, { "title": "Aqua Teen Hunger Force", "image": "https://static.tvmaze.com/uploads/images/original_untouched/78/196672.jpg", "desc": "Aqua Teen Hunger Force follows the adventures of the aptly named Aqua Teen Hunger Force, a group of mystery-solving fast food items. The team consists of Master Shake, or Shake, a rather sadistic, lazy, ordering milkshake who loves to torture Meatwad. Frylock, the floating box of fries, is the brains the group, and contains the one thing that the rest of the group lacks: common sense. Meatwad is a loving, caring, gentle ball of meat that crawls wherever he goes, who is frequently tortured by Shake." }, { "title": "Gravity Falls", "image": "https://static.tvmaze.com/uploads/images/original_untouched/2/6140.jpg", "desc": "Twin brother and sister Dipper and Mabel Pines are in for an unexpected adventure when they spend the summer with their great Uncle in the mysterious town of Gravity Falls, Oregon." }, { "title": "Invader ZIM", "image": "https://static.tvmaze.com/uploads/images/original_untouched/2/6242.jpg", "desc": "Invader ZIM is an eccentric alien soldier from the planet Irk. He was banished from the Irken Empire after nearly destroying his home planet on an early mission. After begging his superiors, the Almighty Tallest Red and Purple, for another chance, they decide to get rid of him once and for all. They trick him into going on a \"secret mission\" to an obscure planet at the edge of the universe, a planet with the unlikely name of Earth, in hopes that he'll die along the way. But their trick backfires when ZIM safely reaches Earth and begins his ever-so-subtle conquest of it. He disguises himself as a schoolboy, and now the only person who can stop him is one kid - Dib, a somewhat insane paranormal researcher, who sees straight through ZIM's disguise and is intent on stopping his reign of \"terror\". The only problem is that neither of them is very good at stopping the other." }, { "title": "Duckman: Private Dick/Family Man", "image": "https://static.tvmaze.com/uploads/images/original_untouched/2/6606.jpg", "desc": "With the help of his pig partner, a sarcastic Duckman is solving crimes." }, { "title": "Rugrats", "image": "https://static.tvmaze.com/uploads/images/original_untouched/402/1007439.jpg", "desc": "Rugrats reveals the world from a baby's point of view. Everything looks bigger, more mysterious and uncontrollable. Angelica, the oldest, likes to terrorize her cousin, Tommy, and his friends, and is famous for screaming, \"You stupid babies!\" The adults in the series are often clueless." }, { "title": "Wolverine and the X-Men", "image": "https://static.tvmaze.com/uploads/images/original_untouched/254/636101.jpg", "desc": "After a mysterious explosion at the Xavier mansion, and the resulting disappearances of Professor Xavier and Jean Grey, the distraught X-Men disband. But soon, Wolverine, Storm. Beast and the others find themselves together again to battle the increasingly powerful Mutant Response Division, and to prevent a catastrophic future that Xavier has warned must never come to pass." }, { "title": "X-Men", "image": "https://static.tvmaze.com/uploads/images/original_untouched/305/764844.jpg", "desc": "With stories adapted directly from the original comic books, this show is a piece of Marvel history and a must-have for every X-Men fan. Discover the origins of your favorite characters and uncover the secrets of Magneto and more of the world's most diabolical villains in X-Men.Due to budget issues and issues with animation production deadlines not been met most episodes from Season 3 onwards aired out of production order, leading to some storylines not making any sense and creating plot holes, however this was somewhat rectified later with the DVD and streaming releases." }, { "title": "The Batman", "image": "https://static.tvmaze.com/uploads/images/original_untouched/3/9370.jpg", "desc": "Hidden in the shadows, The Batman casts a protective eye while tracking the thugs, thieves and criminal masterminds that claim Gotham City's dark alleys each night. In one magnificent swoop, he descends up on opponents and battles with a fierceness that seems almost inhuman. This is the young Bruce Wayne who assumes the role of Gotham's greatest defender in a fresh retelling of the Dark Knight's beginnings.With incredible gadgets, awesome animation and a cool new vibe, these 13 exciting episodes from the hit series showcase The Batman taking on your favourite villains \u2013 The Joker, The Penguin, Mr. Freeze, Catwoman, Bane \u2013 and new crazies you'll love to hate!" }, { "title": "Naruto: Shipp\u016bden", "image": "https://static.tvmaze.com/uploads/images/original_untouched/3/9413.jpg", "desc": "Naruto: Shippuden is the continuation of the original animated TV series Naruto.The story revolves around an older and slightly more matured Uzumaki Naruto and his quest to save his friend Uchiha Sasuke from the grips of the snake-like Shinobi, Orochimaru. After 2 and a half years Naruto finally returns to his village of Konoha, and sets about putting his ambitions to work, though it will not be easy, as he has amassed a few (more dangerous) enemies, in the likes of the shinobi organization; Akatsuki." }, { "title": "Sonic Boom", "image": "https://static.tvmaze.com/uploads/images/original_untouched/3/9460.jpg", "desc": "Sonic Boom is a CGI animated show based on the massive popular game Sonic the Hedgehog." }, { "title": "Naruto", "image": "https://static.tvmaze.com/uploads/images/original_untouched/3/9744.jpg", "desc": "Naruto closely follows the life of a boy who is feared and detested by the villagers of the hidden leaf village of Konoha. The distrust of the boy has little to do with the boy himself, but it's what's inside him that causes anxiety. Long before Naruto came to be, a Kyuubi (demon fox) with great fury and power waged war taking many lives. The battle ensued for a long time until a man known as the Fourth Hokage, Yondaime, the strongest ninja in Konoha, fiercely fought the Kyuubi. The fight was soon won by Yondaime as he sealed the evil demon in a human body. Thus the boy, Naruto, was born. As Naruto grows he decides to become the strongest ninja in Konoha in an effort to show everyone that he is not as they perceive him to be, but is a human being worthy of love and admiration. But the road to becoming Hokage, the title for the strongest ninja in Konoha, is a long and arduous one. It is a path filled with betrayal, pain, and loss; but with hard work, Naruto may achieve Hokage." }, { "title": "Batman Beyond", "image": "https://static.tvmaze.com/uploads/images/original_untouched/4/10842.jpg", "desc": "Batman Beyond tells the story of Terry McGinnis was just an ordinary teenager...until his father was mysteriously murdered. Suspecting foul play at his father's company Wayne/Powers Corporation, Terry meets Bruce Wayne and learns a secret identity hidden for decades. Now too old to battle injustice, Wayne is a bitter shell of his former self and refuses to help. So Terry does what any brash young kid would do: steal the Batsuit and take matters into his own hands! Vowing to avenge his father's death, Terry dons the high-tech suit - tricked out with jetpacks for flying, a supersensitive microphone for eavesdropping and even camouflage capabilities - in search of his father's assassin." }, { "title": "Justice League Unlimited", "image": "https://static.tvmaze.com/uploads/images/original_untouched/4/10846.jpg", "desc": "The New Justice League Unlimited consists of Superman, Batman, Wonder Woman, The Flash, Green Lantern, Martian Manhunter and Hawkgirl \u2013 they have all saved countless lives from unspeakable dangers, using their unique powers to fight evil on Earth and across the galaxy. And until now, they have all worked alone. But after an alien invasion that took their combined powers to defeat, these seven super heroes unite to become the Justice League." }, { "title": "Futurama", "image": "https://static.tvmaze.com/uploads/images/original_untouched/587/1469185.jpg", "desc": "Futurama follows pizza guy Philip J. Fry, who reawakens in 31st century New New York after a cryonics lab accident. Now part of the Planet Express delivery crew, Fry travels to the farthest reaches of the universe with his robot buddy Bender and cyclopsian love interest Leela, discovering freaky mutants, intergalactic conspiracies and other strange stuff." }, { "title": "Avatar: The Last Airbender", "image": "https://static.tvmaze.com/uploads/images/original_untouched/79/199224.jpg", "desc": "Water. Earth. Fire. Air. Only the Avatar was the master of all four elements. Only he could stop the ruthless Fire Nation from conquering the world. But when the world needed him most, he disappeared. Until now... On the South Pole, a lone Water Tribe village struggles to survive. It's here that a young Waterbender named Katara and her warrior brother Sokka rescue a strange boy named Aang from a cavernous iceberg. Not only is Aang an Airbender--a race of people no one has seen in a century--but they soon discover that Aang is also the long lost Avatar. Now it's up to Katara and Sokka to make sure Aang faces his destiny to save the tribe--and himself. Did we mention he's only 12?" }, { "title": "Star Wars: The Clone Wars", "image": "https://static.tvmaze.com/uploads/images/original_untouched/237/593387.jpg", "desc": "The Clone Wars television series chronicles the events taking place during Star Wars Episode II: Attack of the Clones and Star Wars Episode III: Revenge of the Sith. The Clone Wars will ultimately lead to the downfall of the Jedi and the rise of the Galactic Empire." }, { "title": "Pok\u00e9mon", "image": "https://static.tvmaze.com/uploads/images/original_untouched/459/1148947.jpg", "desc": "The great adventures of 10 year old Ash Ketchum, a young Pok\u00e9mon Trainer from Pallet Town, as well as his best friend and everlasting companion Pikachu. Together, they venture through many regions: the traditional region of Kanto, the culturally rich Johto, the temperate region of Hoenn, the mystical region of Sinnoh, the advanced landscapes of Unova, Kalos, with it's many landmarks, the splendor of the tropics of Alola, and the expansive Galar. Along the way, they meet many new companions, many new friends and new rivals, while also competing in each regional league; as well as toppling evil organizations, and outsmarting the pesky and persistent Team Rocket. However, through all this, Ash's goal remains unchanged: to discover many new Pok\u00e9mon, and to become regarded as the world's greatest Pok\u00e9mon Master." }, { "title": "Teenage Mutant Ninja Turtles", "image": "https://static.tvmaze.com/uploads/images/original_untouched/5/14755.jpg", "desc": "Leo, Donnie, Raph and Mikey are mutant turtles who have been trained in the art of ninjutsu by their rat sensei, Master Splinter. Emerging from their sewer lair, the reptile brothers confront the wondrous world of New York City, facing villains more dangerous and pizza more delicious than anything they could have imagined.Through battles with Shredder, the Kraang and loads of super-powerful mutants, the Turtles learn to rely on themselves and each other as they grow to become the heroes they are destined to be." }, { "title": "The Avengers: Earth's Mightiest Heroes!", "image": "https://static.tvmaze.com/uploads/images/original_untouched/399/998632.jpg", "desc": "When the planet is threatened by Super Villains, time-traveling conquerors, alien invaders, mythical monsters or mad robots bent on the total destruction of humanity; when the forces of evil are so overwhelming that no single hero has the power to save the world; when there is no hope left, the Avengers Assemble!" }, { "title": "Phineas and Ferb", "image": "https://static.tvmaze.com/uploads/images/original_untouched/595/1489325.jpg", "desc": "Phineas and Ferb are Phineas Flynn and his stepbrother, Ferb Fletcher who are determined to make every day of their summer vacation fun. They try building a full-scale roller coaster, becoming musicians, building a backyard beach, and traveling back in time to meet dinosaurs. Their family pet, Perry the Platypus, doubles as a secret agent and battles evil. Meanwhile, older sister Candace is tattling on them to Mom and Dad, though she can never seem to catch them in the act." }, { "title": "Robot Chicken", "image": "https://static.tvmaze.com/uploads/images/original_untouched/587/1468712.jpg", "desc": "Robot Chicken uses stop-motion animation to bring pop-culture parodies to life in a modern take on the variety/sketch show format." }, { "title": "Young Justice", "image": "https://static.tvmaze.com/uploads/images/original_untouched/364/911074.jpg", "desc": "Young Justice is an animated series about a squad of teenage superheroes from the DC Comics universe. Three years after Young Justice was cancelled by Cartoon Network, the cult action-animated series came back on DC Universe." }, { "title": "Daniel Tiger's Neighborhood", "image": "https://static.tvmaze.com/uploads/images/original_untouched/5/14968.jpg", "desc": "Daniel Tiger's Neighborhood is a animated program for preschoolers ages 2 to 4 which builds on the pioneering PBS series, Mister Rogers' Neighborhood. This new series, for a new generation of children, tells its engaging stories about the life of a preschooler using musical strategies grounded in Fred Rogers' landmark social-emotional curriculum. Through imagination, creativity and music, Daniel and his friends learn the key social skills necessary for school and for life." }, { "title": "Durarara!!", "image": "https://static.tvmaze.com/uploads/images/original_untouched/5/14981.jpg", "desc": "Mikado Ryugamine is a young man who yearns for the city like no other. At the invitation of his childhood friend, Masaomi Kida, he moves to Ikebukuro, Tokyo and enters school there." }, { "title": "The Critic", "image": "https://static.tvmaze.com/uploads/images/original_untouched/5/14997.jpg", "desc": "From the producers of \"The Simpsons\"! Jon Lovitz is the animated Jay Sherman, a TV movie critic who is forced to review the most pathetic films which he always rates as \"It stinks.\" In addition to the film parodies, the show also deals with his personal life: working for a tyrannical media mogul boss, his lovelife and his family." }, { "title": "Peg + Cat", "image": "https://static.tvmaze.com/uploads/images/original_untouched/5/14998.jpg", "desc": "Peg + Cat inspires preschool children to see math as exciting, accessible, and fun." }, { "title": "Shaun the Sheep", "image": "https://static.tvmaze.com/uploads/images/original_untouched/594/1486166.jpg", "desc": "One of Aardman Animations' best-loved characters stars in his own series. Set on a remote rural farm, Shaun's flock live a peaceful life under the watchful eye of their sheepdog Bitzer" }, { "title": "Teen Titans Go!", "image": "https://static.tvmaze.com/uploads/images/original_untouched/599/1497769.jpg", "desc": "Teen Titans Go! is a character-driven comedy series focuses on the funny that happens in between saving the world and living together as teenagers without adult supervision. The comedic mayhem of the animated series is punctuated by pranks and the occasional need to fight crime, but it will also deal with the everyday issues of adolescence. With epic staring contests to decide who does the laundry, a series of quests and battles to construct the perfect sandwich or fighting crime in Jump City, one thing is for sure, these Titans will always be ready for an adventure inside the house and out." }, { "title": "Sofia the First", "image": "https://static.tvmaze.com/uploads/images/original_untouched/6/15008.jpg", "desc": "Sofia the First is a about a little girl, a commoner, until her mom marries the king and suddenly she's royalty." }, { "title": "Mickey Mouse Clubhouse", "image": "https://static.tvmaze.com/uploads/images/original_untouched/6/15020.jpg", "desc": "Disney's Mickey Mouse Clubhouse is the first computer generated 3-D animation television series to feature the \"Sensational Six.\" Mickey Mouse, Minnie Mouse, Donald Duck, Daisy Duck, Goofy, and Pluto star in this series, which focuses on interactivity with its primarily preschool-aged audience to stimulate problem solving. Each episode involves the characters helping its viewers to \"solve a specific age-appropriate problem utilizing basic skills, such as identifying shapes and counting through ten.\" The series uses Playhouse Disney's \"whole child\" curriculum of cognitive, social and creative learning opportunities." }], "hor": [{ "title": "Bitten", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/15.jpg", "desc": "Based on the critically acclaimed series of novels from Kelley Armstrong. Set in Toronto and upper New York State, Bitten follows the adventures of 28-year-old Elena Michaels, the world's only female werewolf. An orphan, Elena thought she finally found her \"happily ever after\" with her new love Clayton, until her life changed forever. With one small bite, the normal life she craved was taken away and she was left to survive life with the Pack." }, { "title": "Lost Girl", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/137.jpg", "desc": "Lost Girl follows supernatural seductress Bo, a Succubus who feeds on the sexual energy of humans. Growing up with human parents, Bo had no reason to believe she was anything other than the girl next door \u2014 until she drained her boyfriend to death in their first sexual encounter. Now she has hit the road alone and afraid. <br /> She discovers she is one of the Fae, creatures of legend and folklore, who pass as humans while feeding off them secretly and in different ways, as they have for millennia. Relieved yet horrified to find out that she is not alone, Bo decides to take the middle path between the humans and the Fae while embarking on a personal mission to unlock the secrets of her origin.With the help of her human sidekick, Kenzi, and Dyson, a sexy police detective, Bo takes on a challenge every week helping a Fae or human client who comes to her to solve a mystery, or to right a wrong." }, { "title": "Constantine", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/154.jpg", "desc": "Based on the wildly popular comic book series \"Hellblazer\" from DC Comics, seasoned demon hunter and master of the occult John Constantine is armed with a ferocious knowledge of the dark arts and a wickedly naughty wit. He fights the good fight - or at least he did. With his soul already damned to hell, he's decided to abandon his campaign against evil until a series of events thrusts him back into the fray, and he'll do whatever it takes to protect the innocent. With the balance of good and evil on the line\u200e, Constantine will use his skills to travel the country, find the supernatural terrors that threaten our world and send them back where they belong. After that, who knows... maybe there's hope for him and his soul after all." }, { "title": "Penny Dreadful", "image": "https://static.tvmaze.com/uploads/images/original_untouched/48/122260.jpg", "desc": "Some of literature's most terrifying characters, including Dr. Frankenstein and his monster, Dorian Gray, and iconic figures from the novel Dracula are lurking in the darkest corners of Victorian London. They are joined by a core of original characters in a complex, frightening new narrative. Penny Dreadful is a psychological thriller filled with dark mystery and suspense, where personal demons from the past can be stronger than vampires, evil spirits and immortal beasts." }, { "title": "The Strain", "image": "https://static.tvmaze.com/uploads/images/original_untouched/444/1111710.jpg", "desc": "The Strain is a high-concept thriller that tells the story of Dr. Ephraim Goodweather, the head of the Center for Disease Control Canary Team in New York City. He and his team are called upon to investigate a mysterious viral outbreak with hallmarks of an ancient and evil strain of vampirism. As the strain spreads, Goodweather, his team, and an assembly of everyday New Yorkers wage war for the fate of humanity itself." }, { "title": "Hellsing", "image": "https://static.tvmaze.com/uploads/images/original_untouched/178/446544.jpg", "desc": "Hellsing is a 13-part anime based on the manga of the same name. The plot is significantly difficult to that of the the manga although the characters are the same. The show mainly focuses on the hellsing institute that houses the anti-hero named Alucard who swore loyalty to the Helsing family many years before. Alucard being the first ever vampire takes on a new apprentice named Sera's." }, { "title": "Hellsing Ultimate", "image": "https://static.tvmaze.com/uploads/images/original_untouched/178/446780.jpg", "desc": "Hellsing Ultimate, unlike the 13-part Hellsing series, follows the manga of the same name very closely. Alucard being the main protagonist and anti-hero/vampire. Hellsing Ultimate is a 10-part series of OVAs whereby Alucard turns Sera's into a vampire. The main focus of the plot being on an enemy neo-nazi group." }, { "title": "Berserk", "image": "https://static.tvmaze.com/uploads/images/original_untouched/396/991619.jpg", "desc": "Berserk is a 25-part anime set in a dark fantasy/horror environment whereby the series focuses on the main character guts; a lone swordman who later meets up with a group of mercenaries called the band of the hawk. The leader of this band holds a strange necklace called a behelit that will only lead to evil." }, { "title": "American Horror Story", "image": "https://static.tvmaze.com/uploads/images/original_untouched/473/1183640.jpg", "desc": "American Horror Story is an horror television anthology series. Each season is conceived as a self-contained miniseries, following a disparate set of characters and settings, and a storyline with its own beginning, middle, and end. While some actors appear for more than one year, they play completely different roles in each season." }, { "title": "Hemlock Grove", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/305.jpg", "desc": "Secrets are just a part of daily life in the small Pennsylvania town of Hemlock Grove, where the darkest evils hide in plain sight." }, { "title": "Helix", "image": "https://static.tvmaze.com/uploads/images/original_untouched/126/316697.jpg", "desc": "Helix is a science fiction thriller that focuses on a CDC expedition into the arctic. They go there to investigate the potential outbreak of a disease with no idea what they are getting themselves into. They encounter an almost zombie-like threat that could threaten mankind itself whilst the operator of the facility seems to know more than what he is saying." }, { "title": "Z Nation", "image": "https://static.tvmaze.com/uploads/images/original_untouched/170/426759.jpg", "desc": "Z Nation starts three years after the zombie virus has gutted the country, a team of everyday heroes must transport the only known survivor of the plague from New York to California, where the last functioning viral lab waits for his blood. Although the antibodies he carries are the world's last, best hope for a vaccine, he hides a dark secret that threatens them all. With humankind's survival at stake, the ragtag band embarks on a journey of survival across three thousand miles of rusted-out post-apocalyptic America." }, { "title": "The Walking Dead", "image": "https://static.tvmaze.com/uploads/images/original_untouched/424/1061900.jpg", "desc": "The Walking Dead tells the story of the months and years that follow after a zombie apocalypse. It follows a group of survivors, led by former police officer Rick Grimes, who travel in search of a safe and secure home. As the world overrun by the dead takes its toll on the survivors, their interpersonal conflicts present a greater danger to their continuing survival than the walkers that roam the country. Over time, the characters are changed by the constant exposure to death and some grow willing to do anything to survive.Based on the comic book series of the same name by Robert Kirkman, Tony Moore, and Charlie Adlard." }, { "title": "From Dusk Till Dawn: The Series", "image": "https://static.tvmaze.com/uploads/images/original_untouched/70/176381.jpg", "desc": "From Dusk Till Dawn: The Series, based on the thrill-ride film of the same name, is a supernatural crime saga centered around bank robber, Seth Gecko and his violent, unpredictable brother, Richard \"Richie\" Gecko, who are wanted by the FBI and Texas Rangers Earl McGraw and Freddie Gonzalez after a bank heist leaves several people dead. While on the run to Mexico, Seth and Richie encounter former pastor Jacob Fuller and his family, whom they take hostage. Using the family RV to cross the border, chaos ensues when the group detours to a strip club that is populated by vampires. They are forced to fight until dawn in order to get out alive." }, { "title": "Carniv\u00e0le", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/2256.jpg", "desc": "Carniv\u00e0le is set in the United States during the Great Depression and Dust Bowl. In tracing the lives of two disparate groups of people, its overarching story depicts the battle between good and evil and the struggle between free will and destiny, the storyline mixes Christian theology with Gnosticism and Masonic lore, particularly that of the Knights Templar." }, { "title": "Hannibal", "image": "https://static.tvmaze.com/uploads/images/original_untouched/498/1246088.jpg", "desc": "Criminal profiler Will Graham is tasked by FBI agent Jack Crawford, the head of Behavioral Sciences, to help investigate the disappearances of eight young girls across Minnesota. Graham and Crawford's team investigate several subsequent murders, while also trying to catch the Chesapeake Ripper. With the investigation weighing heavily on Graham, Crawford decides to have him supervised by psychiatrist Dr. Hannibal Lecter, who, unbeknownst to them, is the Chesapeake Ripper himself, actively seeking to derail the investigation." }, { "title": "Bates Motel", "image": "https://static.tvmaze.com/uploads/images/original_untouched/542/1356518.jpg", "desc": "Bates Motel is a contemporary prequel to the genre-defining film Psycho, and gives viewers an intimate portrayal of how Norman Bates' psyche unravels through his teenage years.Following the tragic death of her husband, Norma Bates buys a motel on the outskirts of the idyllic coastal town of White Pine Bay, seeking a fresh start. As Norma and Norman get ensconced in their new home, they discover this town isn't quite what it seems, and the locals aren't so quick to let them in on their secrets. But the Bates' are done being pushed around and will do whatever it takes to survive - and will do whatever it takes to protect their own secrets." }, { "title": "Da Vinci's Demons", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/2892.jpg", "desc": "In a world where thought and faith are controlled, one man fights to set knowledge free. Leonardo da Vinci is tortured by a gift of superhuman genius. He finds himself in a conflict between truth and lies, religion and reason, past and future. His aspirations are used against him by opposing forces \u2013 luring him into a game of seduction where those who despise his intellect need him most.His quest for knowledge nearly becomes his undoing, but da Vinci's genius prevails and he emerges as an unstoppable force that lifts an entire era out of darkness and propels it into light. His story becomes a mirror into our own world, calling us all to join his fight to free the future." }, { "title": "Being Human", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/3627.jpg", "desc": "Being Human is a series based on the UK series of the same name. It is a supernatural orientated around a vampire, ghost and werewolf trying to live under the same household." }, { "title": "Ravenswood", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/3700.jpg", "desc": "Ravenswood centered on a town not far from Rosewood, Pa., which has suffered under a deadly curse for generations. Five strangers find themselves connected by this fatal curse and need to dig into the town's mysterious and terrible history before it's too late for all of them." }, { "title": "The River", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/3788.jpg", "desc": "The River follows the story of wildlife expert and TV personality Emmet Cole. Emmet set course around the world with his wife, Tess, and son, Lincoln, while filming what would become one of the most popular shows in television. After he goes missing deep in the Amazon, his family, friends and crew set out on a mysterious and deadly journey to find him. Famed explorer Dr. Emmet Cole went looking for magic deep in the uncharted Amazon and never returned. The shocking truth about his disappearance is out there, somewhere, just waiting to be discovered. To the millions of kids who grew up watching his nature show, Dr. Cole was a hero. To his own son, Lincoln he was more of an enigma. Now, six months after he vanished, Lincoln is finally ready to bury the past when Dr. Cole's emergency beacon suddenly goes off. At the urging of his mother, Tess Lincoln reluctantly joins her on a search for his father. To fund the rescue, they agree to let Dr. Cole's cagey ex-producer, Clark film the mission documentary-style." }, { "title": "Tales from the Crypt", "image": "https://static.tvmaze.com/uploads/images/original_untouched/3/9142.jpg", "desc": "Cadaverous scream legend/all-around punster the Crypt Keeper hosts these forays of fright and fun based on classic E.C. Comics tales from back in the day \u2013 and drawing on the talents of top filmmakers Richard Donner, Walter Hill, Joel Silver, Robert Zemeckis and others. So belly up to the bar and name your poison. Is it a deranged Santa on a personal slay ride? A man surgically implanted with as many lives (and deaths) as a cat? Honeymooners who each want the other to fulfill the 'til-death vow pronto? These and more terror-rific tales await. Ghoul love 'em!" }, { "title": "Moonlight", "image": "https://static.tvmaze.com/uploads/images/original_untouched/3/9159.jpg", "desc": "Mick St. John is a captivating, charming- and immortal- private investigator from Los Angeles who defies the traditional blood-sucking norms of his vampire tendencies by using his wit and powerful supernatural abilities to help the living. In a life-altering twist of fate, Mick was \"bitten\" 60 years ago by his new bride, the seductive Coraline. Forever 30 years of age, Mick's as handsome and charismatic as the day he was \"turned,\" and he eschews others of his kind who view humans only as a source of nourishment. With only a handful of like-minded confidantes for company, including the eternally young, wealthy and mischievous Josef, a hedge fund trader who relishes his uniqueness, Mick fills his infinite days protecting the living. But one night years ago, a single act of kindness changed Mick when he saved a young girl's life, making him want to be a better vampire. Now their paths cross again and Mick develops a distinctive bond with Beth Turner who has grown into a beautiful, ambitious Internet investigative reporter. Reconnecting with her unleashes feelings Mick knows he can't pursue without exposing the part of him that would make him a monster in Beth's eyes. As Mick lives between two realities, fighting his adversaries among the undead and falling in love, he discovers the mysteries and pleasures that a valuable life has to offer." }, { "title": "Harper's Island", "image": "https://static.tvmaze.com/uploads/images/original_untouched/30/77028.jpg", "desc": "Harper's Island is about a group of family and friends who travel to a secluded island for a destination wedding. They've come to laugh... to love... and, though they don't know it... to die. As the wedding festivities begin, friendships are tested and secrets exposed as a murderer claims victims, one by one, transforming the wedding week of fun and celebration into a terrifying struggle for survival. In every episode, someone is killed and every person is a suspect, from the wedding party to the island locals. By the end of the 13 episodes, all questions will be answered, the killer will be revealed and only a few will survive." }, { "title": "Blood Ties", "image": "https://static.tvmaze.com/uploads/images/original_untouched/3/9272.jpg", "desc": "After witnessing a horrific demonic murder at the side of a Toronto roadway, private investigator Vicki Nelson finds herself on a collision course with another citizen investigating the case. He is Henry Fitzroy \u2013 former Duke of Richmond, cutting-edge graphic novelist and 470-year old vampire.To solve the brutal murder, Vicky finds herself collaborating against her better judgment, with the suave and seductive Fitzroy. The relationship soon progresses beyond a pretty professional arrangement, complicating her long-term love affair with ex-partner Detective Mike Celluci...and pretty well everything else in her life.As the cases become more bizarre &amp; complex, the relationship between Vicki &amp; Mike becomes fractured. Meanwhile, Henry's behavior creates suspicion for all involved in the cases, casting doubt among the three." }, { "title": "Dead Set", "image": "https://static.tvmaze.com/uploads/images/original_untouched/501/1253505.jpg", "desc": "Starring Jaime Winstone, Dead Set is E4's horror series in which the dead are returning to life and attacking the living. Curiously there are a few people left in Britain who aren't worried about any of this - that's because they're the remaining contestants in Big Brother. Cocooned in the safety of the Big Brother house, they're blissfully unaware of the horrific events unfolding in the outside world. Until an eviction night when all hell breaks loose...Kelly, a production runner working on a fictional series of Big Brother, finds herself trying to fend off the walking dead alongside her producer boss Patrick, boyfriend Riq and the remaining Big Brother housemates. Featuring cameos from Davina McCall and several former housemates, this is a cruel and twisted take on one of TV's biggest game shows." }, { "title": "Masters of Horror", "image": "https://static.tvmaze.com/uploads/images/original_untouched/3/9371.jpg", "desc": "Chilling horror stories from the most prominent directors of the genre." }, { "title": "In the Flesh", "image": "https://static.tvmaze.com/uploads/images/original_untouched/32/80591.jpg", "desc": "Thousands of dead people have risen from their graves and nearly destroyed Britain. A cure has been found - but can the treated zombies be rehabilitated back into living society?" }, { "title": "The Secret Circle", "image": "https://static.tvmaze.com/uploads/images/original_untouched/397/994581.jpg", "desc": "After Diana introduces Cassie to other members of the circle, they reveal themselves as witches, and that she is one as well. Initially, Cassie refuses to believe them - until Adam shows her how to unlock her magical powers. After Cassie reluctantly joins the circle, Adam, Diana, Faye, and the other members of the coven quickly discover that with Cassie in their circle, they are able to cast spells more powerful than they ever could before." }, { "title": "Young Dracula", "image": "https://static.tvmaze.com/uploads/images/original_untouched/99/249076.jpg", "desc": "Fitting in is hard enough, but when your dad is Count Dracula, things go from hard to worse! Follow the comic misadventures of Vlad and Ingrid as they move from Transylvania to Britain with their narcissistic single dad, the Count." }, { "title": "The Haunted", "image": "https://static.tvmaze.com/uploads/images/original_untouched/6/15987.jpg", "desc": "The Haunted is a chilling and frightening show featuring true horror stories about animals, humans and the paranormal. Each program features one or two stories recounted by the people who actually experienced them. Cinematic recreations serve to heighten the drama caused by animal and human contact with the unexplainable and to bring the witnesses' testimonies to life." }, { "title": "Attack on Titan", "image": "https://static.tvmaze.com/uploads/images/original_untouched/476/1191684.jpg", "desc": "Known in Japan as Shingeki no Kyojin, many years ago, the last remnants of humanity were forced to retreat behind the towering walls of a fortified city to escape the massive, man-eating Titans that roamed the land outside their fortress. Only the heroic members of the Scouting Legion dared to stray beyond the safety of the walls \u2013 but even those brave warriors seldom returned alive. Those within the city clung to the illusion of a peaceful existence until the day that dream was shattered, and their slim chance at survival was reduced to one horrifying choice: kill \u2013 or be devoured!" }, { "title": "Ghost Adventures", "image": "https://static.tvmaze.com/uploads/images/original_untouched/564/1410376.jpg", "desc": "Are you ready for the lockdown?<br /><br />Ghost Adventures crew -- Zak Bagans, Aaron Goodwin, Billy Tolley, and Jay Wasley -- is back to investigate the scariest, most notorious, haunted places in the world.<br /><br />The trio will interview eyewitnesses and historians at each location, arming themselves with the stories of the ghosts they will later provoke and confront during their dusk-to-dawn lockdowns. (Note: They don't always come out unscathed!) Then they'll review and analyze their findings with some the most respected experts and specialists in the paranormal field." }, { "title": "Bag of Bones", "image": "https://static.tvmaze.com/uploads/images/original_untouched/6/16571.jpg", "desc": "Bag of Bones is a ghost story of grief and lost love's enduring bonds, about an innocent child caught in a terrible crossfire and a new love haunted by past secrets." }, { "title": "Do No Harm", "image": "https://static.tvmaze.com/uploads/images/original_untouched/6/16604.jpg", "desc": "Dr. Jason Cole is a highly respected neurosurgeon who has it all - a lucrative career, confident charm and the gift of compassion. But he also has a deep, dark secret. One morning, after waking up disoriented in a wrecked hotel room amidst near-naked women he's never seen before, he knows one thing: it happened again. Every night at the same hour, something inside Jason changes, leaving him almost unrecognizable - seductive, devious, borderline sociopathic. This new man is his dangerous alternate personality, who goes by the name Ian Price. For years Jason has battled Ian, keeping him in check with a powerful experimental sedative. But now his - their - body has developed a resistance to the serum, setting Ian free once again. And to make matters worse, after being suppressed for so long, Ian is hell-bent on taking revenge on his oppressor. With everyone Jason cares about at risk - patients, friends, coworkers and even the woman he loves - he must stop Ian once and for all. Will they find some common ground, or will they bring each other down? Hell hath no fury like an alter ego scorned." }, { "title": "Fear Itself", "image": "https://static.tvmaze.com/uploads/images/original_untouched/6/16655.jpg", "desc": "Fear Itself is a provocative suspense and horror anthology series pushing the boundaries of this classic genre through a host of provocative talent, both in front of and behind the camera." }, { "title": "Jekyll", "image": "https://static.tvmaze.com/uploads/images/original_untouched/6/17233.jpg", "desc": "Adapted from the famous novel by Robert Louis Stephenson, this contemporary thriller follows Dr. Tom Jackman as he uses an array of modern technlogy in an increasingly desperate attempt to hold at bay a deadly foe: Mr. Hyde, his savage and ruthless alter ego. Although they time-share the same body, Mr. Hyde is significantly stronger and faster than Tom -- and his strength is still growing. The stakes get even higher when Hyde learns of the existence of Tom's beautiful wife, Claire, and their two children, whom he uses as pawns in his power play against Tom. The doctor relies heavily on his assistant, psychiatric nurse Katherine Reimer, to help him somehow keep Hyde in check. Peter Syme is Tom's best friend, Miranda Callendar is a private eye who stumbles onto Tom's bizarre double life, and Benjamin is an American overseeing a mission to overtake and capture Hyde." }, { "title": "American Gothic", "image": "https://static.tvmaze.com/uploads/images/original_untouched/419/1048256.jpg", "desc": "The rural community of Trinity, South Carolina, a postcard-pretty enclave of antebellum houses and manicured lawns, is a town tormented and seduc
