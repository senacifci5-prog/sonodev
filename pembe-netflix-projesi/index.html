ed by the ominous presence of one man, Sheriff Lucas Buck." }, { "title": "Becoming Human", "image": "https://static.tvmaze.com/uploads/images/original_untouched/6/17271.jpg", "desc": "Follow Adam, Being Human's teenage vampire, as he becomes embroiled in a dark and dangerous mystery. At the heart of Becoming Human are the eight episodes where the story unfolds... but there's more. You can get deeper into the mystery with mobile phone videos, newspaper clippings, character profiles and other updates revealed by the characters themselves as they try and track down the killer." }, { "title": "Brimstone", "image": "https://static.tvmaze.com/uploads/images/original_untouched/83/207963.jpg", "desc": "A dead cop, sentenced to Hell, is returned to Earth by the Devil to recover 113 escaped evil spirits." }, { "title": "Les Revenants", "image": "https://static.tvmaze.com/uploads/images/original_untouched/272/680355.jpg", "desc": "Les Revenants is a unique, stylish and powerful supernatural drama. It follows the residents of a small French alpine town as they come to terms with a series of mysterious and unbelievable occurrences. As a small group of unknowingly deceased men, women and children return from the dead and attempt to re-join the family and friends they left behind years before, the town begins to experience a series of chilling local murders\u2026.Beautifully filmed, expertly plotted, and featuring superbly believable performances and an unforgettably atmospheric soundtrack by cult Scottish group Mogwai, The Returned is the most original and enthralling series in years." }, { "title": "A Haunting", "image": "https://static.tvmaze.com/uploads/images/original_untouched/389/973876.jpg", "desc": "\"When the door between the spirit world and ours is opened, the stuff of nightmares becomes reality\". That's according to the introduction of this series, A Haunting, which dramatizes the \"true\" stories of people who have been haunted or experienced a haunting. In this docu-drama, the actual people involved recount their stories on-camera, as the frightening events of their stories are re-enacted...." }, { "title": "Kingdom Hospital", "image": "https://static.tvmaze.com/uploads/images/original_untouched/7/17967.jpg", "desc": "Kingdom Hospital is the haunting new 15-hour drama series developed directly for television by the award-winning, best-selling master of horror. Using Lars Von Trier's Danish miniseries \"Riget\" (a.k.a. \"The Kingdom\") as a point of inspiration, King tells the terrifying story of The Kingdom, a hospital with a bizarre population that includes a nearly blind security guard, a nurse who regularly faints at the sight of blood and a paraplegic artist whose recovery is a step beyond miraculous. When patients and staff hear the tortured voice of a little girl crying through the halls, they are dismissive of any suggestion of mysticism of unseen powers ... but at their own peril." }, { "title": "Dracula", "image": "https://static.tvmaze.com/uploads/images/original_untouched/7/19413.jpg", "desc": "Golden Globe winner Jonathan Rhys Meyers (\"The Tudors\") stars in this provocative new drama as one of the world's most iconic characters. It's the late 19th century and the mysterious Dracula (Rhys Meyers) has arrived in London, posing as an American entrepreneur who wants to bring modern science to Victorian society. He's especially interested in the new technology of electricity, which promises to brighten the night - useful for someone who avoids the sun. But he has another reason for his travels: He hopes to take revenge on those who cursed him with immortality centuries earlier. Everything seems to be going according to plan... until he becomes infatuated with a woman who appears to be a reincarnation of his dead wife." }, { "title": "Rosemary's Baby", "image": "https://static.tvmaze.com/uploads/images/original_untouched/7/19805.jpg", "desc": "Rosemary's Baby centers on a young married couple who move into a Paris apartment that has a haunted past. After getting pregnant, the wife becomes increasingly suspicious that both her husband and their neighbors will have ulterior motives when her child is born." }, { "title": "Tokyo Ghoul", "image": "https://static.tvmaze.com/uploads/images/original_untouched/604/1510953.jpg", "desc": "The story follows Ken Kaneki, a college student who meets a woman named Rize Kamishiro at Anteiku, a coffee shop. They share an interest in literature and plan a date. While walking Rize home, Ken is attacked by her. Rize reveals that she is a ghoul, a human-like creature that hunts and devours human flesh. As she is about to finish him off, she is crushed by a falling platform. Kaneki is taken to the hospital in critical condition. The doctor decides to transplant Rize's organs into Ken. He then must deal with life as a half-human/half-ghoul, including interacting with ghoul society and its conflicting factions, while striving to keep his identity secret from other humans." }, { "title": "The Returned", "image": "https://static.tvmaze.com/uploads/images/original_untouched/9/23492.jpg", "desc": "The Returned focuses on a small town that is turned upside down when several local people who have been long presumed dead suddenly reappear, having not aged and unaware of their own fatality. As they attempt to resume their lives, strange phenomena and gruesome murders begin to occur. The Returned takes an incredibly unique approach, filled with suspense and twists and turns, to the subject of the living dead." }, { "title": "iZombie", "image": "https://static.tvmaze.com/uploads/images/original_untouched/477/1194487.jpg", "desc": "Olivia \"Liv\" Moore is a rosy-cheeked, disciplined, over-achieving medical resident who had her life path completely mapped out... until the night she attended a party that unexpectedly turned into a zombie feeding frenzy. As one of the newly undead, Liv has devised a way to resist her baser urges to devour fresh human brains--she's taken a job in the Seattle coroner's office.In this appropriately dead-end job, she can secretly snack on the brains of the many Jane and John Doe corpses that make a final stop in the morgue. Liv remains resigned to an eternity without hope or purpose, until she realizes that with every brain she consumes, she retains a portion of that person's memories, and she begins to experience visions from the point of view of the murder victims. It's not the same as being alive again, but at least she can find purpose in her undead existence by helping to solve the murders of those who are indeed fully dead." }, { "title": "Lexx", "image": "https://static.tvmaze.com/uploads/images/original_untouched/9/22933.jpg", "desc": "Hailed as \"the most imaginative Sci-Fi since The Hitchhiker's Guide to the Galaxy\" (New York Daily News), Lexx follows the nomadic existence of four misfit characters who have inadvertently stolen the most powerful weapon of destruction ever made: a Manhattan-sized, genetically-modified insect-ship. In its debut season, the Lexx's quirky crew-former security guard, Captain Stanley Tweedle; the luscious love slave Zev; the dead-but-deadly assassin Kai; and the robot head 790." }, { "title": "The Lizzie Borden Chronicles", "image": "https://static.tvmaze.com/uploads/images/original_untouched/9/24093.jpg", "desc": "The Lizzie Borden Chronicles delivers an intense and fictionalized account of actual events and people surrounding Lizzie's life after her controversial acquittal of the horrific double murder of her father and stepmother in 1892, when the exonerated figure lives a life awash in newfound celebrity filled with scandalous love affairs. But when numerous people close to Lizzie - ranging from her half-brother William, to Broadway luminaries and her business associate/underworld kingpin Mr. Flowers - start to mysteriously die under brutal and strange circumstances, legendary Pinkerton detective Charlie Siringo becomes determined to prove her involvement in their ultimate demise." }], "com": [{ "title": "Californication", "image": "https://static.tvmaze.com/uploads/images/original_untouched/38/95017.jpg", "desc": "Californication is a series based around the writer Hank Moody. He moves to California and suffers a writers block as well as many other family and personal issues. His drinking and generally unhealthy lifestyle interrupts his relationships with his long term lover Karen and his daughter Becca as he struggles with his manager Charlie Runkle." }, { "title": "Fargo", "image": "https://static.tvmaze.com/uploads/images/original_untouched/487/1219631.jpg", "desc": "Fargo is a seasonal anthology crime drama with some dark comical elements, inspired by the film Fargo written by the Coen brothers. Each season follows a new case and new characters, all entrenched in the trademark humor, murder and \"Minnesota nice\" that has made the film an enduring classic." }, { "title": "Last Man Standing", "image": "https://static.tvmaze.com/uploads/images/original_untouched/419/1049994.jpg", "desc": "Last Man Standing follows Mike Baxter, a married father of three girls, who tries to maintain his manliness, despite being surrounded by women." }, { "title": "Brooklyn Nine-Nine", "image": "https://static.tvmaze.com/uploads/images/original_untouched/402/1007484.jpg", "desc": "Brooklyn Nine-Nine is an ensemble comedy about a talented-but-carefree detective, a by-the-book police captain and their precinct colleagues. While based in the workplace, Brooklyn Nine-Nine is not really about the job \u2013 it's about the men and women behind the badge." }, { "title": "Red Band Society", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/441.jpg", "desc": "What if a hospital was your high school, boarding school and summer camp rolled into one? What if it was the place where you fell in love for the first time and made friendships that lasted a lifetime? And what if it was all weirdly hilarious and the most fun you ever had in your entire life? This is the world of Red Band Society." }, { "title": "black-ish", "image": "https://static.tvmaze.com/uploads/images/original_untouched/388/970329.jpg", "desc": "Andre 'Dre' Johnson has a great job, a beautiful wife, Rainbow, four kids, and a colonial home in the 'burbs. But has success brought too much assimilation for this black family? With a little help from his dad, Dre sets out to establish a sense of cultural identity for his family that honors their past while embracing the future." }, { "title": "New Girl", "image": "https://static.tvmaze.com/uploads/images/original_untouched/481/1202650.jpg", "desc": "New Girl is a single-camera ensemble comedy starring Zooey Deschanel as Jess, an offbeat girl who - after a bad breakup - moves in with three single guys and essentially sets a bomb off in their lives." }, { "title": "The Big Bang Theory", "image": "https://static.tvmaze.com/uploads/images/original_untouched/173/433868.jpg", "desc": "The Big Bang Theory is a comedy about brilliant physicists, Leonard and Sheldon, who are the kind of \"beautiful minds\" that understand how the universe works. But none of that genius helps them interact with people, especially women. All this begins to change when a free-spirited beauty named Penny moves in next door. Sheldon, Leonard's roommate, is quite content spending his nights playing Klingon Boggle with their socially dysfunctional friends, fellow Cal Tech scientists Wolowitz and Koothrappali. However, Leonard sees in Penny a whole new universe of possibilities... including love." }, { "title": "The Mindy Project", "image": "https://static.tvmaze.com/uploads/images/original_untouched/485/1213297.jpg", "desc": "The Mindy Project is a single-camera comedy series which follows a skilled OB/GYN navigating the tricky waters of both her personal and professional life." }, { "title": "The Middle", "image": "https://static.tvmaze.com/uploads/images/original_untouched/605/1514143.jpg", "desc": "Forget about athletes, movie stars and politicians. Parents are the real heroes - but we think Frankie Heck, must be some kind of superhero. A loving wife and mother of three, she's middle class in the middle of the country and is rapidly approaching middle age.Frankie and her husband, Mike, have lived in Orson, Indiana, their whole lives. A man of few words (every one a zinger), Mike is a manager at the town quarry and Frankie is the third-best used car salesman (out of the three) at the local dealership. She may not be a high-powered career woman, but when it comes to her family, she'll go to just about any length. And with kids like these, she had better. There's Axl, her semi-nudist teenage son conceived while under the influence of Guns N' Roses; Sue, the awkward teenage daughter who fails at everything... but with the utmost of gusto; and their seven-year-old son Brick, whose best friend is his backpack.Sometimes it seems like everyone is trying to get to the top, or struggling not to hit bottom, but we think Frankie and her family will find a lot of love, and a lot of laughs, somewhere in The Middle." }, { "title": "The Mysteries of Laura", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/568.jpg", "desc": "Laura Diamond is a brilliant NYPD homicide detective who balances her \"Columbo\" day job with a crazy family life that includes two unruly twin boys and a soon-to-be ex-husband - also a cop - who just can't seem to sign the divorce papers. Between cleaning up after her boys and cleaning up the streets, she'd be the first to admit she has her \"hot mess\" moments in this hilariously authentic look at what it really means to be a working mom today. Somehow, she makes it all work with the help of her sexy and understanding partner, and things becomes even more complicated when her husband becomes her boss at the precinct. For Laura, every day is a high-wire balancing act." }, { "title": "The Goldbergs", "image": "https://static.tvmaze.com/uploads/images/original_untouched/442/1105185.jpg", "desc": "Before there were parenting blogs, trophies for showing up and peanut allergies, there was a simpler time called the '80s. For geeky and movie obsessed youngest child Adam, these were his wonder years, and he faced them armed with a video camera to capture all the crazy. The Goldbergs are a loving family like any other -- just with a lot more yelling. Mom Beverly is a classic \"smother,\" an overbearing, overprotective matriarch who loves her delicious kids, but still rules this brood with 100% authority and zero sense of boundaries. Dad Murray is gruff and sometimes oblivious, parenting with half his attention span but all his heart. Sister Erica is popular and terrifying, doing her best to cover up that she's the smartest of the clan. Barry is a passionate dreamer, who maybe dreams a little too big and who always gets the short end of the stick. Adam is the youngest, a camera-wielding future director who's navigating first love, and growing up with his family. Rounding out the family is beloved grandfather Al \"Pops\" Solomon, the wild man of the clan, a shameless Don Juan who's learning as much from his family as he teaches them." }, { "title": "Modern Family", "image": "https://static.tvmaze.com/uploads/images/original_untouched/359/898320.jpg", "desc": "Modern Family revolves around three different types of families (nuclear, step- and same-sex) living in the Los Angeles area, who are interrelated through Jay Pritchett and his children, Claire Dunphy (n\u00e9e Pritchett) and Mitchell Pritchett. Patriarch Jay is remarried to a much younger woman, Gloria Delgado Pritchett (n\u00e9e Ramirez), a passionate Colombian with whom he has an infant son, Fulgencio (Joe) Pritchett, and a son from Gloria's previous marriage, Manny Delgado.Jay's daughter Claire was a homemaker, but has returned to the business world. She is now the chief executive of her father's previous business, Pritchett's Closets and Blinds. She is married to Phil Dunphy, a realtor and self-professed \"cool dad\". They have three children: Haley Dunphy, a stereotypical ditzy teenage girl; Alex Dunphy, a nerdy, smart middle child; and Luke Dunphy, the off-beat only son.Jay's lawyer son Mitchell and his husband Cameron Tucker have one daughter, Lily Tucker-Pritchett. As the name suggests, this family represents a modern-day family, and episodes are comically based on situations which many families encounter in real life." }, { "title": "The Simpsons", "image": "https://static.tvmaze.com/uploads/images/original_untouched/588/1471731.jpg", "desc": "The Simpsons is the longest running scripted show in US television history. It captures the adventures of Homer, Marge, Maggie, Bart and Lisa who are living in a fictional town called Springfield." }, { "title": "Family Guy", "image": "https://static.tvmaze.com/uploads/images/original_untouched/609/1523259.jpg", "desc": "Family Guy follows Peter Griffin the endearingly ignorant dad, and his hilariously offbeat family of middle-class New Englanders in Quahog, RI. Lois is Peter's wife, a stay-at-home mom with no patience for her family's antics. Then there are their kids: 18-year-old Meg is an outcast at school and the Griffin family punching bag; 13-year-old Chris is a socially awkward teen who doesn't have a clue about the opposite sex; and one-year-old Stewie is a diabolically clever baby whose burgeoning sexuality is very much a work in progress. Rounding out the Griffin household is Brian the family dog and a ladies' man who is one step away from AA." }, { "title": "Bad Judge", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/678.jpg", "desc": "No excuses, no apologies, no compromises. Wild child Rebecca Wright knows how to have a good time, but she also happens to be one of L.A.'s toughest and most respected criminal court judges. She has a reputation for unorthodox behavior in the courtroom, including creative rulings and saying exactly what's on her mind. Her private life, on the other hand, is anything but innocent. She parties too much and rocks out on the drums in a band with her best friend, Jenny. While there's no shortage of male admirers who would love to spend time with her, she's not ready to settle down... except when an 8-year-old boy - whose parents were put in jail by Rebecca - needs her help. He may, in fact, be the one thing that starts to tame this Bad Judge." }, { "title": "A to Z", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/679.jpg", "desc": "This is the A to Z story of Andrew and Zelda - a pair that almost wasn't - and all that happened from the day they met. Andrew has always been a secret romantic... not above crooning to Celine Dion while driving to work, with dreams of finding \"the one.\" He imagines her to be just like that shimmering beauty he spotted that night in that silver dress at that concert two years ago. Zelda, having grown up with a hippie mom who believed the universe would provide for everything, rebelled into a no-nonsense practical lawyer who prefers the control of online dating. But when a computer glitch sends her a total mismatch, she's asked to come in for an interview at the Internet dating site where Andrew works, and this is where it all begins. Andrew and Zelda meet for the first time and despite their differences, sparks fly. She thinks it's chance. He thinks it's fate. After all, he's convinced she's the shimmering girl in the silver dress. Is it true love forever or just a detour in destiny?" }, { "title": "Parenthood", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/685.jpg", "desc": "Parenthood is the critically acclaimed one-hour drama inspired by the box office hit of the same name. This reimagined and updated Universal Television/Imagine Entertainment production follows the trials and tribulations of the very large, colorful and imperfect Braverman family. Sarah Braverman is a single mother with two kids - the bright but rebellious Amber who is living on her own, and sullen and sensitive Drew who returns to Berkeley this year." }, { "title": "Manhattan Love Story", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/729.jpg", "desc": "Have you ever wondered what your date was thinking? This romantic comedy exposes the differences between men and women through the unfiltered thoughts, and often contradictory actions, of a new couple who have just begun dating." }, { "title": "Bob's Burgers", "image": "https://static.tvmaze.com/uploads/images/original_untouched/589/1474468.jpg", "desc": "The series follows Bob who runs Bob's Burgers, with the help of his wife and their three kids. Bob has big ideas about burgers, but the rest of the clan falls short on service. Despite the greasy counters and lousy location, the Belchers are determined to make every \"Grand Re-Re-Re-opening\" a success. Bob's wife, Linda, stands by her man and often does so by bursting into song. Their eldest daughter, 13-year-old Tina has a slight obsession with boys and zombies. Middle child Gene is an aspiring musician with a thirst for life. Louise is the bunny ears-wearing youngest daughter with an off-kilter sense of humor that makes her somewhat of a liability in the kitchen \u2013 and with the public." }, { "title": "Mulaney", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/846.jpg", "desc": "John Mulaney is a 29-year-old comedian working the stand-up circuit and looking for his big break. But life drastically changes when self-centered comedy legend and game show host Lou Cannon hires Mulaney as a writer. Lou may be John's entr\u00e9e into the world of big-money show business, but he's also a total nightmare. Still, the job represents everything Mulaney thinks he wants. But does he really? And, at what cost? And what does it say about him if he quits? And what does it say about him if he stays? And has Lou had work done?" }, { "title": "South Park", "image": "https://static.tvmaze.com/uploads/images/original_untouched/594/1485766.jpg", "desc": "South Park is an adult comedy animation show centred around 4 children in the small town of south park. Its humour is often dark involving satirical elements and mocking current real-life events." }, { "title": "King of the Hill", "image": "https://static.tvmaze.com/uploads/images/original_untouched/592/1480199.jpg", "desc": "King of the Hill follows the life of Hank Hill, his wife Peggy, their 13-year-old son Bobby, their 18-year-old niece Luanne, her husband Lucky, their newborn baby girl Gracie and his beer guzzling neighborhood buddies, Dale, Bill and Boomhauer." }, { "title": "Transparent", "image": "https://static.tvmaze.com/uploads/images/original_untouched/210/525553.jpg", "desc": "In Transparent, an LA family with serious boundary issues have their past and future unravel when a dramatic admission causes everyone's secrets to spill out." }, { "title": "2 Broke Girls", "image": "https://static.tvmaze.com/uploads/images/original_untouched/63/158548.jpg", "desc": "2 Broke Girls is a comedy about two young women waitressing at a greasy spoon diner who strike up an unlikely friendship in the hopes of launching a successful business - if only they can raise the cash. Sassy, streetwise Max Black works two jobs just to get by, one of which is waiting tables during the night shift at the retro-hip Williamsburg Diner. Sophisticated Caroline Channing is an uptown trust fund princess who's having a run of bad luck that forces her to reluctantly give waitressing a shot. At first, Max sees Caroline as yet another in a long line of inept servers she must cover for, but she's surprised to find that Caroline has as much substance as she does style.When Caroline discovers Max's knack for baking amazing cupcakes, she sees a lucrative future for them, but first they need to raise the start-up money. While they save their tips, they'll stay at the restaurant, working with Oleg, an overly flirtatious Russian cook; Earl, a 75-year-old kool-kat cashier; and Han Lee, the new, eager-to-please owner of the diner. Working together, these two broke girls living in one expensive city might just find the perfect recipe for their big break." }, { "title": "Selfie", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/1756.jpg", "desc": "Eliza Dooley has 263,000 followers who hang on to her every post, tweet and selfie. But one lonely day, she has a revelation: being friended is not the same as having actual friends. She asks marketing guru Henry to 'rebrand' her self-obsessed reputation and teach her how to connect with people in the real world. Loosely based on My Fair Lady, Selfie explores the modern struggles of Eliza and Henry, as he tries to teach her how to live life offline - whether she 'likes' it or not." }, { "title": "Mom", "image": "https://static.tvmaze.com/uploads/images/original_untouched/47/119089.jpg", "desc": "Christy is a single mom who, after years of questionable choices, is now sober and trying to get her life on track. She's tested daily by her newly sober mother, Bonnie, who is trying to make up for all the ways she's let Christy down. Christy is further challenged by her relationships with her own kids. Her daughter Violet is engaged to a man twice her age and her ten-year-old son, Roscoe, would rather live with his father Baxter, a former slacker who has only recently gotten himself together. To help her stay sober, Christy relies on her support system from AA, comprised of her sponsor Marjorie, her wealthy sponsee, Jill, and her emotional friend, Wendy. Christy tries to remain positive as she attempts to overcome her past and build a better future, but with her dysfunctional family and life's many setbacks, it's always an uphill battle." }, { "title": "Marry Me", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/1836.jpg", "desc": "Six years ago, Annie and Jake bonded over their mutual love of nachos and they've been inseparable ever since. Now, after returning from a romantic two-week island vacation, Jake's all set to pop the question. Before he can ask, though, Annie lets loose on Jake for his inability to commit. She was expecting him to \"put a ring on it\" in paradise and now Jake's perfect proposal is ruined. Not wanting to spend the next 60 years talking about that mess of a proposal, Jake and Annie decide to hold off on the engagement until they can do it right. Yet if history tells us anything, it's when we really want things to go right that they all tend to go wrong. The only thing we know for sure is these two are destined to be together whether they can get it together or not." }, { "title": "Two and a Half Men", "image": "https://static.tvmaze.com/uploads/images/original_untouched/118/296854.jpg", "desc": "Charlie is a well-to-do bachelor with a house at the beach, a Jaguar in the front, and an easy way with women. His casual Malibu lifestyle is interrupted when his tightly wound brother Alan, who's facing a divorce, and his son Jake, come to live with him. Together, these two and a half men confront the challenges of growing up; finally. Complicating matters are the brothers' self-obsessed, controlling mother, Evelyn, Alan's estranged wife, Judith and Charlie's crazy neighbor Rose, who wants to be a part of his life and is willing to do anything to be around. After the death of his brother, Alan Harper meets and befriends a lonely young man named Walden Schmidt who turns out to be a billionaire. Unable to afford his brother's home, Alan sells Walden the house, and as a way of showing his gratitude, Walden allows Alan and his son Jake to move in with him." }, { "title": "About a Boy", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/1880.jpg", "desc": "Will Freeman lives a charmed existence as the ultimate man-child. After writing a hit song, he was granted a life of free time, free love and freedom from financial woes. He's single, unemployed and loving it. So imagine his surprise when Fiona, a needy, single mom and her oddly charming 11-year-old son Marcus move in next door and disrupt his perfect world." }, { "title": "The Millers", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/1886.jpg", "desc": "The Millers follows Nathan Miller, a recently divorced local roving news reporter looking forward to living the singles life until his parents' marital problems unexpectedly derail his plans. After Nathan finally breaks the news of his divorce to his parents Carol and Tom, his father is inspired to follow suit and stuns the family when he leaves his wife of 43 years. Already in shock, Nathan is even more aghast when his meddlesome mom decides to move in with him. Meanwhile, his absent-minded dad imposes upon Nathan's sister Debbie, her husband Adam and their daughter. Nathan's best friend and news cameraman Ray was excited to be Nathan's wingman in the dating scene, but Carol manages to even cramp his style. Now, as Nathan and his sister settle in with their truly impossible parents, they both wonder just how long the aggravating adjustment period is going to last." }, { "title": "The McCarthys", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/1900.jpg", "desc": "The McCarthys is a multi-camera comedy about a close-knit, sports-crazed Boston family whose somewhat athletically challenged son, Ronny, is chosen by his father to be his assistant high school basketball coach, much to the surprise of his more qualified siblings. Ronny wants nothing more than to move away, join the singles scene and find a partner. His distraught mother, Marjorie is not upset that her favorite son is gay, but that he wants to leave Boston and his family.Ronny's plans change, however, when his politically incorrect and outspoken father, Arthur stuns everyone with his choice for an assistant. Touched by his father's offer, Ronny embarks on a completely different future and he can be sure that his loving family, including his twin brothers Sean and Gerard and his sister Jackie, are going to have a very vocal opinion about it." }, { "title": "Cristela", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/1932.jpg", "desc": "Cristela's dream of becoming a lawyer is something her traditional Mexican-American family doesn't quite understand. She's entering her sixth year of law school after juggling home obligations and working multiple jobs to pay her way." }, { "title": "Looking", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/1961.jpg", "desc": "Looking offers up the unfiltered experiences of three close friends living - and loving - in modern-day San Francisco. Friendship may bind them, but each is at a markedly different point in his journey: Patrick is the 29-year-old video game designer getting back into the dating world in the wake of his ex's engagement; aspiring artist Agust\u00edn, 31, is questioning the idea of monogamy amid a move to domesticate with his boyfriend; and the group's oldest member - longtime waiter Dom, 39 - is facing middle age with romantic and professional dreams still unfulfilled.The trio's stories intertwine and unspool dramatically as they search for happiness and intimacy in an age of unparalleled choices - and rights - for gay men. Also important to the \u2018Looking' mix is the progressive, unpredictable, sexually open culture of the Bay Area, with real San Francisco locations serving as a backdrop for the group's lives. Rounding out the \u2018Looking' world are a bevy of dynamic gay men including Kevin, Lynn, and Richie, as well as a wide-range of supporting characters like Dom's roommate Doris, Agust\u00edn's boyfriend Frank, and Patrick's co-worker Owen." }, { "title": "Getting On", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/1970.jpg", "desc": "From creators Mark V. Olsen and Will Scheffer, the series follows the daily lives of nurses and doctors as they struggle with the darkly comic realities of caring for the elderly in an overwhelmed healthcare system, skewering the petty bureaucracies of modern medical practice in America." }, { "title": "Veep", "image": "https://static.tvmaze.com/uploads/images/original_untouched/189/472887.jpg", "desc": "Former Senator Selina Meyer has accepted the call to serve as Vice President of the United States. The job is nothing like she imagined and everything she was warned about. Veep follows Meyer and her staff as they attempt to make their mark and leave a lasting legacy, without getting tripped up in the day-to-day political games that define Washington." }, { "title": "Silicon Valley", "image": "https://static.tvmaze.com/uploads/images/original_untouched/215/538434.jpg", "desc": "In the high-tech gold rush of modern Silicon Valley, the people most qualified to succeed are the least capable of handling success. From Mike Judge comes this satire about a programmer whose game-changing algorithm becomes the subject of a valley-wide bidding war." }, { "title": "The Comeback", "image": "https://static.tvmaze.com/uploads/images/original_untouched/616/1541026.jpg", "desc": "The limited comedy series stars Lisa Kudrow as the embattled Valerie Cherish, a fading TV \"It Girl\" who was once so desperate to stay in the spotlight that she allowed cameras to follow her every move as she appeared on a new sitcom - with disastrous results. Now, it's ten years later, and Valerie thinks she has it all figured out this time. She doesn't." }, { "title": "House of Lies", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/2003.jpg", "desc": "Charming, fast talking Marty Kaan and his crack team of management consultants know how to play the corporate game better than anyone, by using every dirty trick in the book to woo powerful CEOs and close huge deals. In the board rooms, barrooms, and bedrooms of the power elite, corruption is business as usual and everyone's out for themselves first. Nothing is sacred in this scathing, irreverent satire of corporate America today." }, { "title": "Episodes", "image": "https://static.tvmaze.com/uploads/images/original_untouched/123/309535.jpg", "desc": "Matt LeBlanc stars as Matt LeBlanc in Episodes, the hilarious comedy series about remaking a comedy series. When husband and wife writing team Sean and Beverly set out to reproduce their British TV hit for an American network, all of their worst fears come true as Hollywood lives up to its reputation for absurdity. Not only does the network cast Matt LeBlanc in the starring role, but Matt takes the lead in deviously twisting their beloved series into a terrible clich\u00e9, while testing the couple's marriage with diversions and temptations." }, { "title": "Nurse Jackie", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/2021.jpg", "desc": "Every day is a matter of life and death in a hectic New York City hospital, but for Nurse Jackie that's the easiest part. Between chronic back pain that won't quit, and a personal life on the constant edge of collapse, it's going to take a white lie here, a bent rule there, and a handful of secret strategies to relieve the pain, and stay one step ahead of total disaster." }, { "title": "Web Therapy", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/2036.jpg", "desc": "Fiona Wallice is a therapist with little patience for her patients. Tired of hearing about people's problems for fifty long minutes, she devises a new treatment, the three-minute video chat. And still, the sessions end up being largely about her. If she's your therapist, you've got problems. Emmy Award\u00ae winner Lisa Kudrow co-created, produces and stars in this outrageous therapeutic send-up. Originally produced as webisodes, Web Therapy features an A-list guest cast who, along with Kudrow, improvise their performances with hilarious results." }, { "title": "Shameless", "image": "https://static.tvmaze.com/uploads/images/original_untouched/486/1215661.jpg", "desc": "Shameless is a fiercely engaging and fearlessly twisted series. Chicagoan Frank Gallagher is the proud single dad of six smart, industrious, independent kids, who without him would be... perhaps better off. When Frank's not at the bar spending what little money they have, he's passed out on the floor. But the kids have found ways to grow up in spite of him. They may not be like any family you know, but they make no apologies for being exactly who they are." }, { "title": "Weeds", "image": "https://static.tvmaze.com/uploads/images/original_untouched/545/1362942.jpg", "desc": "Weeds is based around an american widow (Nancy Botwin) with 2 children who begins selling cannabis for financial gain after the death of her husband. Her family become involved in more and more illegal activities as the show progresses." }, { "title": "Chuck", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/2385.jpg", "desc": "Chuck Bartowski is a computer geek that gets catapulted into a new career as the government's most vital secret agent. When Chuck opens an e-mail subliminally encoded with government secrets, he unwittingly downloads an entire server of sensitive data into his brain. With the government's most precious secrets in Chuck's head, Major John Casey of the National Security Agency assumes the responsibility of protecting him. His partner is the CIA's top agent, Sarah Walker." }, { "title": "Orange Is the New Black", "image": "https://static.tvmaze.com/uploads/images/original_untouched/203/508250.jpg", "desc": "Orange Is the New Black is the story of Piper Chapman, a woman in her thirties who is sentenced to fifteen months in prison after being convicted of a decade-old crime of transporting money for her drug-dealing girlfriend." }, { "title": "How I Met Your Mother", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/2451.jpg", "desc": "How I Met Your Mother is a comedy about Ted and how he fell in love. It all starts when Ted's best friend, Marshall drops the bombshell that he's going to propose to his long-time girlfriend, Lilya kindergarten teacher. At that moment, Ted realizes that he had better get a move on if he too hopes to find true love. Helping him in his quest is Barney a friend with endless, sometimes outrageous opinions, a penchant for suits and a foolproof way to meet women. When Ted meets Robin he's sure it's love at first sight, but destiny may have something else in store." }, { "title": "Parks and Recreation", "image": "https://static.tvmaze.com/uploads/images/original_untouched/481/1204341.jpg", "desc": "Parks and Recreation is a comedy series based around the main character Leslie Knope (a bureaucrat) in the parks department of Pawnee." }, { "title": "BoJack Horseman", "image": "https://static.tvmaze.com/uploads/images/original_untouched/405/1012627.jpg", "desc": "Meet the most beloved sitcom horse of the '90s, 20 years later. He's a curmudgeon with a heart of... not quite gold... but something like gold. Copper?" }, { "title": "Hello Ladies", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/2826.jpg", "desc": "Stewart is a gawky, 6' 7\" Englishman searching for the woman of his dreams in Los Angeles. Half as charming - and twice as desperate - as he thinks he is, he's obsessed with infiltrating the glamorous world of beautiful people, who won't let him in." }], "rom": [{ "title": "Bitten", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/15.jpg", "desc": "Based on the critically acclaimed series of novels from Kelley Armstrong. Set in Toronto and upper New York State, Bitten follows the adventures of 28-year-old Elena Michaels, the world's only female werewolf. An orphan, Elena thought she finally found her \"happily ever after\" with her new love Clayton, until her life changed forever. With one small bite, the normal life she craved was taken away and she was left to survive life with the Pack." }, { "title": "Glee", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/73.jpg", "desc": "Glee is a musical comedy about a group of ambitious and talented young adults in search of strength, acceptance and, ultimately, their voice." }, { "title": "True Blood", "image": "https://static.tvmaze.com/uploads/images/original_untouched/410/1026956.jpg", "desc": "True Blood is a horror/drama based on a series of novels called The Southern American Vampires Mysteries. It focuses on Sookie Stackhouse and her various encounters with vampires and other supernatural beings. The show is centred in the small town of Bon Temps in Louisiana. The show focuses heavily on the co-existence of humans with vampires. The show also touches on several other controversial issues involving equal rights, violence, discrimination and religion." }, { "title": "Outlander", "image": "https://static.tvmaze.com/uploads/images/original_untouched/616/1541142.jpg", "desc": "Outlander follows the story of Claire Randall, a married combat nurse from 1945 who is mysteriously swept back in time to 1743, where she is immediately thrown into an unknown world where her life is threatened. When she is forced to marry Jamie, a chivalrous and romantic young Scottish warrior, a passionate affair is ignited that tears Claire's heart between two vastly different men in two irreconcilable lives.The Outlander series, adapted from Diana Gabaldon's international best-selling books, spans the genres of romance, science fiction, history and adventure into one epic tale." }, { "title": "Witches of East End", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/392.jpg", "desc": "Based on Melissa de la Cruz's best-selling novel, Witches of East End centers on the mysterious Beauchamp family who live in the secluded seaside town of East End. Free-spirited artist Joanna Beauchamp is the mother of wild-child bartender Freya and shy librarian Ingrid, who are both gifted -- and cursed -- with a magic birthright, of which they are unaware. Freya notices bizarre occurrences in her life when she inexplicably finds herself drawn to the troubled brother of her wealthy fiance. But it isn't until Joanna's estranged sister appears with a warning that could change the family's fate that the matriarch must reveal to her daughters that they are immortal witches with untapped powers, a revelation that turns their small-town life upside down." }, { "title": "Nashville", "image": "https://static.tvmaze.com/uploads/images/original_untouched/89/224913.jpg", "desc": "Nashville is set against the backdrop of the city's music scene and follows Rayna Jaymes and Juliette Barnes. Both women face personal and professional challenges as they navigate their paths as artists and individuals. Surrounding them, and often complicating their lives, are their family, friends and, in some cases, lovers, as well as the up-and-coming performers and songwriters trying to get ahead in the business. Music City can mean so many things to different people. In Nashville, musicians and songwriters are at the heart of the storm driven by their own ambitions. Some are fueled by their creativity and passion for fame. Others struggle to cope with the pressures of success and are doing everything in their power to stay on top." }, { "title": "New Girl", "image": "https://static.tvmaze.com/uploads/images/original_untouched/481/1202650.jpg", "desc": "New Girl is a single-camera ensemble comedy starring Zooey Deschanel as Jess, an offbeat girl who - after a bad breakup - moves in with three single guys and essentially sets a bomb off in their lives." }, { "title": "The Originals", "image": "https://static.tvmaze.com/uploads/images/original_untouched/271/678632.jpg", "desc": "The Originals is a spin-off show from the supernatural drama The Vampire Diaries. It is based in the city of New Orleans where the originals represent the original vampires. The show is primarily based around conflict between vampires, werewolves and witches in the city." }, { "title": "The Vampire Diaries", "image": "https://static.tvmaze.com/uploads/images/original_untouched/271/677698.jpg", "desc": "The Vampire Diaries is a supernatural drama/romance based around Elena Gilbert who falls in love with a 163 year old vampire.Based on a novel series by L.J. Smith." }, { "title": "Grey's Anatomy", "image": "https://static.tvmaze.com/uploads/images/original_untouched/600/1501061.jpg", "desc": "The doctors of Grey Sloan Memorial Hospital deal with life-or-death consequences on a daily basis -- it's in one another that they find comfort, friendship and, at times, more than friendship. Together they're discovering that neither medicine nor relationships can be defined in black and white. Real life only comes in shades of grey." }, { "title": "The Mindy Project", "image": "https://static.tvmaze.com/uploads/images/original_untouched/485/1213297.jpg", "desc": "The Mindy Project is a single-camera comedy series which follows a skilled OB/GYN navigating the tricky waters of both her personal and professional life." }, { "title": "Reign", "image": "https://static.tvmaze.com/uploads/images/original_untouched/81/204119.jpg", "desc": "Hidden between the lines of the history books is the story of Mary Stuart, the young woman the world would come to know as Mary, Queen of Scots. Queen of Scotland since she was six days old, the teenage Mary is already a headstrong monarch - beautiful, passionate, and poised at the very beginning of her tumultuous rise to power. Arriving in France with four close friends as her ladies-in-waiting, Mary has been sent to secure Scotland's strategic alliance by formalizing her arranged engagement to the French king's dashing son, Prince Francis. But the match isn't signed and sealed, it depends more on politics, religion and secret agendas than affairs of the heart. With danger and sexual intrigue around every dark castle corner, Mary rallies her ladies-in-waiting and steels herself, ready to rule the new land and balance the demands of her country and her heart." }, { "title": "A to Z", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/679.jpg", "desc": "This is the A to Z story of Andrew and Zelda - a pair that almost wasn't - and all that happened from the day they met. Andrew has always been a secret romantic... not above crooning to Celine Dion while driving to work, with dreams of finding \"the one.\" He imagines her to be just like that shimmering beauty he spotted that night in that silver dress at that concert two years ago. Zelda, having grown up with a hippie mom who believed the universe would provide for everything, rebelled into a no-nonsense practical lawyer who prefers the control of online dating. But when a computer glitch sends her a total mismatch, she's asked to come in for an interview at the Internet dating site where Andrew works, and this is where it all begins. Andrew and Zelda meet for the first time and despite their differences, sparks fly. She thinks it's chance. He thinks it's fate. After all, he's convinced she's the shimmering girl in the silver dress. Is it true love forever or just a detour in destiny?" }, { "title": "Manhattan Love Story", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/729.jpg", "desc": "Have you ever wondered what your date was thinking? This romantic comedy exposes the differences between men and women through the unfiltered thoughts, and often contradictory actions, of a new couple who have just begun dating." }, { "title": "Once Upon a Time", "image": "https://static.tvmaze.com/uploads/images/original_untouched/127/319360.jpg", "desc": "Once Upon a Time is Fairy Tale Land. It's filled with magic, monsters and all of the characters we all know from stories growing up. It's real, and so are the people in it. But unlike the \"happily ever after\" you may have heard about, their stories continued, and The Evil Queen cast a Dark Curse over the land...This is Storybrooke. It's a quiet, little New England town filled with people who go about their everyday lives with no idea who they really are. The Queen's Curse has trapped them here and placed her in near-complete control. They have no real memories and no real hope." }, { "title": "Selfie", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/1756.jpg", "desc": "Eliza Dooley has 263,000 followers who hang on to her every post, tweet and selfie. But one lonely day, she has a revelation: being friended is not the same as having actual friends. She asks marketing guru Henry to 'rebrand' her self-obsessed reputation and teach her how to connect with people in the real world. Loosely based on My Fair Lady, Selfie explores the modern struggles of Eliza and Henry, as he tries to teach her how to live life offline - whether she 'likes' it or not." }, { "title": "The Affair", "image": "https://static.tvmaze.com/uploads/images/original_untouched/494/1235104.jpg", "desc": "At once deeply observed and intriguingly elusive, The Affair explores the emotional effects of an extramarital relationship.Noah is a New York City schoolteacher and novelist who is happily married, but resents his dependence on his wealthy father-in-law. Alison is a young waitress trying to piece her life and marriage back together in the wake of a tragedy. The provocative drama unfolds when Alison and Noah meet in Montauk at the end of Long Island." }, { "title": "Jane the Virgin", "image": "https://static.tvmaze.com/uploads/images/original_untouched/591/1478947.jpg", "desc": "When Jane Villanueva was a young girl, her grandmother, Alba, convinced her of two things: telenovelas are the highest form of entertainment, and women must protect their virginity at all costs. Jane the Virgin, although she has always tried to be the good girl who does the right thing, Jane's life has suddenly become as dramatic and complicated as the telenovelas she has always loved." }, { "title": "About a Boy", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/1880.jpg", "desc": "Will Freeman lives a charmed existence as the ultimate man-child. After writing a hit song, he was granted a life of free time, free love and freedom from financial woes. He's single, unemployed and loving it. So imagine his surprise when Fiona, a needy, single mom and her oddly charming 11-year-old son Marcus move in next door and disrupt his perfect world." }, { "title": "Girls", "image": "https://static.tvmaze.com/uploads/images/original_untouched/31/78286.jpg", "desc": "This Emmy winning series is a comic look at the assorted humiliations and rare triumphs of a group of girls in their 20s." }, { "title": "Looking", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/1961.jpg", "desc": "Looking offers up the unfiltered experiences of three close friends living - and loving - in modern-day San Francisco. Friendship may bind them, but each is at a markedly different point in his journey: Patrick is the 29-year-old video game designer getting back into the dating world in the wake of his ex's engagement; aspiring artist Agust\u00edn, 31, is questioning the idea of monogamy amid a move to domesticate with his boyfriend; and the group's oldest member - longtime waiter Dom, 39 - is facing middle age with romantic and professional dreams still unfulfilled.The trio's stories intertwine and unspool dramatically as they search for happiness and intimacy in an age of unparalleled choices - and rights - for gay men. Also important to the \u2018Looking' mix is the progressive, unpredictable, sexually open culture of the Bay Area, with real San Francisco locations serving as a backdrop for the group's lives. Rounding out the \u2018Looking' world are a bevy of dynamic gay men including Kevin, Lynn, and Richie, as well as a wide-range of supporting characters like Dom's roommate Doris, Agust\u00edn's boyfriend Frank, and Patrick's co-worker Owen." }, { "title": "Masters of Sex", "image": "https://static.tvmaze.com/uploads/images/original_untouched/486/1215699.jpg", "desc": "Masters of Sex is a drama that portrays the real-life pioneers of the science of human sexuality, William Masters and Virginia Johnson. The series chronicles the unusual lives, romance, and pop culture trajectory of Masters and Johnson. Their research touched off the sexual revolution and took them from a midwestern teaching hospital in St. Louis to the cover of Time magazine and nearly a dozen appearances on Johnny Carson's couch." }, { "title": "Beauty & the Beast", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/2128.jpg", "desc": "Detective Catherine Chandler is a smart, no-nonsense homicide detective. When she was a teenager, she witnessed the murder of her mother at the hands of two gunmen and herself was saved by someone \u2013 or something. Years have passed and while investigating a murder, Catherine discovers a clue that leads her to Vincent Keller, who was reportedly killed in 2002. Catherine learns that Vincent is actually still alive and that it was he who saved her many years before. For mysterious reasons that have forced him to live outside of traditional society, Vincent has been in hiding for the past 10 years to guard his secret \u2013 when he is enraged, he becomes a terrifying beast, unable to control his super-strength and heightened senses." }, { "title": "How I Met Your Mother", "image": "https://static.tvmaze.com/uploads/images/original_untouched/0/2451.jpg", "desc": "How I Met Your Mother is a comedy about Ted and how he fell in love. It all starts when Ted's best friend, Marshall drops the bombshell that he's going to propose to his long-time girlfriend, Lilya kindergarten teacher. At that moment, Ted realizes that he had better get a move on if he too hopes to find true love. Helping him in his quest is Barney a friend with endless, sometimes outrageous opinions, a penchant for suits and a foolproof way to meet women. When Ted meets Robin he's sure it's love at first sight, but destiny may have something else in store." }, { "title": "Teen Wolf", "image": "https://static.tvmaze.com/uploads/images/original_untouched/30/75365.jpg", "desc": "Always an outsider and often unnoticed, Scott McCall yearns to be recognized in some small way that takes him out of his typical state of high school anonymity. When his best friend, Stiles, convinces him to go into the woods one night to join a police search for a dead body, Scott encounters a creature in the darkness. Narrowly escaping an attack with a vicious bite in his side, the next day brings strange surprises for Scott at school and his life will never be the same.MTV's reboot of the classic 1980s cult movie Teen Wolf." }, { "title": "Pretty Little Liars", "image": "https://static.tvmaze.com/uploads/images/original_untouched/125/314775.jpg", "desc": "Rosewood is a perfect little town. So quiet and pristine, you'd never guess it holds so many secrets. Some of the ugliest ones belong to the prettiest girls in town: Aria, Spencer, Hanna and Emily, four friends whose darkest secrets have been unraveling since Alison, the Queen Bee of their group disappeared. As the mystery surrounding Ali's disappearance resurfaces, the girls begin getting messages from a mysterious \"A,\" who they quickly realize is out to get them. Now, after years of tormenting and numerous shocking revelations, the Liars are united and ready to kick some \"A\" and uncover the truth! No longer just wanting to sit by and wait for \"A's\" latest cruel attack, Aria, Emily, Hanna and Spencer take matters into their own hands and try to finally put a stop to their tormentor. As relationships are put to the test, new and old secrets are revealed and the stakes are raised higher than ever before as the Liars come closer to the truth. Will all of their sacrifices be worth it in the end?" }, { "title": "Star-Crossed", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/2776.jpg", "desc": "When Emery was 6 years old, an alien spacecraft crash-landed in her small town. Whether they came in peace or with more sinister intentions didn't matter: a fierce battle erupted as humans fought for control over their new rivals, an alien species called the Atrians. In the midst of the conflict, Roman, a 6-year-old Atrian boy, found his way to a shed behind Emery's house, where she protected him from harm, bringing him food, comfort - and friendship. In their brief time together, Emery and Roman forged a deep bond, but the authorities wasted no time tracking Roman down and capturing him in a violent confrontation. Emery has grown up believing that Roman was killed that day. Ten years later, the Atrians have been acclimated to life on Earth, but they are interned in a heavily-guarded camp known as the Sector to keep them separate from humans. Now, for the first time, a group of Atrian teens will enroll in a suburban human high school, with the goal of testing the feasibility of human/alien integration. The eyes of the nation and the whole world are fixed on this historical social experiment, an endeavor fraught with suspicion and fear. In the mayhem of the first day, Emery is amazed to learn that Roman was not killed by the authorities and is, in fact, one of the Atrian students. Their childhood bond is quickly rekindled - in a school and a society that distrusts everything about the Atrians, Emery and Roman have found each other again. However, their relationship is threatened by the small-mindedness of their respective communities and the political agendas of people in power. While the world around them rages with anger and prejudice, their bond becomes increasingly strong and increasingly dangerous. As an epic Romeo and Juliet romance unfolds, a violent encounter between Roman's father and Emery's father occurs in the Sector. Can Roman and Emery's love - and peace between the species - survive?" }, { "title": "The Fosters", "image": "https://static.tvmaze.com/uploads/images/original_untouched/116/292055.jpg", "desc": "The Fosters is a critically-acclaimed series that centers on biracial lesbian couple Stef and Lena Foster, who are raising a multi-ethnic family mix of foster and biological kids. The second season will continue to explore the growing Fosters clan, with all the triumphs and travails, twists and turns, that fans of the series have come to expect. Callie and Jude will try to adjust to their new roles in the family, and everyone will deal with the fallout from their previous actions. Past mistakes will come home to roost, consequences will be handed out, and victories will be hard fought, and ultimately well-won. Their deep bonds will grow, enabling America's most modern family to face the future head on, with love in their hearts." }, { "title": "Mistresses", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/2950.jpg", "desc": "Based on the hit UK television series of the same name, Mistresses is a provocative and thrilling drama about the scandalous lives of a sexy and sassy group of four girlfriends, each on her own path to self-discovery. These four friends find support and guidance with each other as they brave their turbulent journeys and life's storms of excitement, secrecy and betrayal, all the while bound by the complex relationships they've created." }, { "title": "The Carrie Diaries", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/3037.jpg", "desc": "It's the summer of 1985, and, for the first time, 17-year-old Carrie Bradshaw can call Manhattan home. After her boyfriend Sebastian and best friend Maggie betrayed her, Carrie is happy to accept the offer to spend the summer living in the downtown loft apartment of her Interview magazine boss Larissa But as summer turns to fall and Carrie heads into her senior year, she and her friends and family discover that letting go of old loves and embracing new dreams comes with some tough new realities but also incredible new opportunities." }, { "title": "Being Human", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/3627.jpg", "desc": "Being Human is a series based on the UK series of the same name. It is a supernatural orientated around a vampire, ghost and werewolf trying to live under the same household." }, { "title": "GCB", "image": "https://static.tvmaze.com/uploads/images/original_untouched/84/212122.jpg", "desc": "Amanda Vaughn once the ultimate high school \"mean girl\", is forced to return home in disgrace after her marriage ends in scandal. Amanda is nothing like the girl she was 20 years ago, but as her old classmates reacquaint themselves with the new Amanda, will her home town welcome her with open arms or seek revenge? No one in this town is a saint, but that doesn't mean they can't have a heart. As Amanda and her teenage kids try to adjust to their new lives, the ladies from her past alternate between sympathy and scheming." }, { "title": "Downton Abbey", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/4601.jpg", "desc": "The Downton Abbey estate stands a splendid example of confidence and mettle, its family enduring for generations and its staff a well-oiled machine of propriety. But change is afoot at Downton--change far surpassing the new electric lights and telephone. A crisis of inheritance threatens to displace the resident Crawley family, in spite of the best efforts of the noble and compassionate Earl, Robert Crawley; his American heiress wife, Cora his comically implacable, opinionated mother, Violet and his beautiful, eldest daughter, Mary, intent on charting her own course. Reluctantly, the family is forced to welcome its heir apparent, the self-made and proudly modern Matthew Crawley himself none too happy about the new arrangements. As Matthew's bristly relationship with Mary begins to crackle with electricity, hope for the future of Downton's dynasty takes shape. But when petty jealousies and ambitions grow among the family and the staff, scheming and secrets--both delicious and dangerous--threaten to derail the scramble to preserve Downton Abbey. Downton Abbey offers a spot-on portrait of a vanishing way of life." }, { "title": "Lovesick", "image": "https://static.tvmaze.com/uploads/images/original_untouched/143/359769.jpg", "desc": "An infectious comedy series following the disastrous exploits of 20-something romantic Dylan, who plans to use his STI diagnosis as a positive journey of self discovery." }, { "title": "Awkward.", "image": "https://static.tvmaze.com/uploads/images/original_untouched/494/1235459.jpg", "desc": "This series takes an irreverent look at the conflict, chaos and humor that defines teenage life through the eyes of 15-year-old Jenna Hamilton, whose life begins to change when a simple accident becomes an epic misunderstanding and is blown way out of proportion.Narrated in the first-person voice of Jenna's blog posts, Awkward captures the humor within the struggles and experiences everyone can relate to from their formative years. The series picks up in the aftermath of the accident as she must deal with a new not-so-fun stigma, while at the same time managing the other daily drama that comes with being a teenager. From a secret relationship with a popular guy, to being undermined by a mean girl, and parents who just don't get it - Jenna's misfortune will eventually serve as the catalyst for amazing change, but it's not without some missteps and mishaps along the way." }, { "title": "Faking It", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/4824.jpg", "desc": "Faking It is a romantic comedy about two best friends who love each other - in slightly different ways. After numerous failed attempts to become popular, the girls are mistakenly outed as lesbians, which launches them to instant celebrity status. Seduced by their newfound fame, Karma and Amy decide to keep up their romantic ruse." }, { "title": "Signed, Sealed, Delivered", "image": "https://static.tvmaze.com/uploads/images/original_untouched/179/448532.jpg", "desc": "Signed, Sealed, Delivered is a wonderful combination of romance, comedy and drama that follows the lives of four postal detectives who transform themselves into a team of detectives to track down intended recipients of undeliverable mail. Their missions take them out of the office and into an unpredictable world where redirected letters and packages can save lives, solve crimes, reunite old loves and change futures by arriving late but somehow always on time.The team includes charming Oliver O'Toole, a genius postal detective and the group's leader; new team member Shane McInerney, a technophile who brings 21st century sensibility to the group; free-spirited, \"girl next door\" Rita Haywith who has a photographic memory; and lovable Norman Dorman, a master in conventional research methods." }, { "title": "Undateable", "image": "https://static.tvmaze.com/uploads/images/original_untouched/44/111506.jpg", "desc": "Undateable is a comedy series about a group of friends who are this close to finding a relationship - they just need a little help.Whether it's due to a lack of style, the wrong job or even just a bad haircut, everyone goes through a time in their lives when they're undateable. Most of us eventually grow out of it, but some people need a little more help than others. Enter Danny Burton Confident, attractive and impervious to outside opinions, 29-year-old Danny - who may be in a state of arrested development himself - decides to help out his new roommate, Justin Kearney the owner of an unsuccessful bar and a chronic overthinker, and Justin's group of oddball friends - Shelly, Burski and Brett Danny introduces the gang to his recently divorced older sister, Leslie who immediately bonds with this group of guys, as she feels a little stuck in her own life as well. The gang spends most of their time at Justin's bar, helping solve each other's respective problems over beers, and while they love to give each other a hard time, they always have each other's back." }, { "title": "Chasing Life", "image": "https://static.tvmaze.com/uploads/images/original_untouched/1/4924.jpg", "desc": "April is a smart, charismatic and quick witted twenty-something aspiring journalist. When not pursuing the latest scoop, April tries to balance her ambitious career with her family, which includes her widowed mom Sara rebellious little sister Brenna and her grandmother We meet April at a pivotal moment in her life: she's landed a fantastic opportunity to impress her hard-nosed Boston newspaper editor and an office romance with her super-sexy co-worker Dominic is just beginning to blossom. In an unexpected twist of fate, April lands in the hospital where her estranged uncle, George works as an oncologist, and she learns the devastating news that she has cancer. The series follows April through her journey in the face of this daunting revelation, during a time in her life when the challenges of finding love and success would be enough to keep any girl occupied. But April is determined to fight and refuses to give up her dreams and goals. Along the way, she'll find new reserves of strength and passion within and discover that facing death may really be the only way to truly live." }, { "title": "Hart of Dixie", "image": "https://static.tvmaze.com/uploads/images/original_untouched/82/205570.jpg", "desc": "Fast-talking New Yorker and brand new doctor Zoe Hart has it all figured out - after graduating top of her class from medical school, she'll follow in her father's footsteps and become a cardio-thoracic surgeon. But when her dreams fall apart, Zoe decides to accept an offer from a stranger, Dr. Harley Wilkes, to work with him at his small practice in Bluebell, Alabama. Zoe arrives in this small Gulf Coast town only to find that Harley has passed away and left his half of the medical practice to her in his will." }, { "title": "Married", "image": "https://static.tvmaze.com/uploads/images/original_untouched/170/427163.jpg", "desc": "Married is about being miserably in love. Russ and Lina Bowman can barely remember what it was like before kids, debt, and suburbia rained on their romance. But every once in a while, in between arguments about their declining sex life and who's driving carpool, they are reminded what drew them together in the first place \u2014 they're best friends." }, { "title": "Satisfaction", "image": "https://static.tvmaze.com/uploads/images/original_untouched/213/534976.jpg", "desc": "In Satisfaction, investment advisor Neil Truman and his wife Grace are sifting through their stagnant relationship when Neil discovers that Grace has been seeing a male escort. After an unusual chain of events, he gains a new perspective on his life and what motivates women, while Grace contemplates whether her needs are being met and if her marriage is worth saving." }, { "title": "You're the Worst", "image": "https://static.tvmaze.com/uploads/images/original_untouched/181/453177.jpg", "desc": "You're the Worst is a comedic love story about what happens when two toxic, self-destructive people fall in love despite themselves and attempt the impossible - a relationship..." }, { "title": "Hit the Floor", "image": "https://static.tvmaze.com/uploads/images/original_untouched/2/5228.jpg", "desc": "Hit the Floor explores the sexy world of professional basketball and the dancers who make the fans (and players) go wild. The Los Angeles Devils are the number one team in the league. When the arena lights go on all of Hollywood comes out to support the million dollar players. But in this city these men share the fame, adrenalin, money, sex and power with their dancers, the Devil Girls." }, { "title": "Single Ladies", "image": "https://static.tvmaze.com/uploads/images/original_untouched/2/5478.jpg", "desc": "Set in Atlanta, Single Ladies follows the lives of three best friends who have very different and unique philosophies on love, sex and relationships. Keisha, Raquel and April navigate the dating scene-- with a few bumps and bruises along the way-- and beg the question: what do women really want?" }, { "title": "The Client List", "image": "https://static.tvmaze.com/uploads/images/original_untouched/486/1215695.jpg", "desc": "The Client List is about Texas housewife; Riley Parks, who, after being deserted by her husband, is left in serious financial straits and takes a job at a seemingly traditional day spa in a neighboring town. But when she realizes some of her co-workers also provide other services, Riley must make the difficult decision whether or not to embrace an opportunity for her to resolve her financial hardships. The series will follow Riley as she delicately balances a moral conflict between two starkly different lives -- one as a single mother in a conservative town struggling to provide for her family and the other as a savvy and ambitious businesswoman working with a raucous, sexy and unpredictable group of women. As Riley becomes more involved, she struggles while working in secrecy knowing her family and friends would disapprove of her decision." }, { "title": "Whitney", "image": "https://static.tvmaze.com/uploads/images/original_untouched/2/6377.jpg", "desc": "They say marriage is the number one cause of divorce. For Alex and Whitney, it's one of many reasons they're determined not to take the plunge.After going to yet another one of their friends' weddings, Whitney realizes that she and Alex are dangerously close to relationship boredom. She sees it happen all the time: pretty soon you're not dressing up for each other, you're not having enough sex, and you start fighting. Determined not to let that happen to them, Whitney consults her close circle of (opinionated) friends and snaps into action. A few awkward sexy costumes and one botched seductive evening later, they end up in the ER after Alex gets a concussion from a compromising position. Not exactly the mind-blowing experience she wanted, but you know what? That's all right. Their relationship might not be perfect on paper, but it works and they really do love each other.Bright young comedian Whitney Cummings brings her unique and hilarious perspective on love to this new comedy series that proves there's no right way to be together... but there are plenty of wrong ways." }, { "title": "Are You the One?", "image": "https://static.tvmaze.com/uploads/images/original_untouched/494/1235413.jpg", "desc": "Are You the One? will follow a group of 10 single women and 10 single men who are self-admittedly horrible at relationships, as they jet off to Puerto Rico in the hopes they'll leave their bad relationship habits behind and surrender to their perfect match.Prior to arrival, the singles will undergo a rigorous matchmaking process involving in-depth interviews and compatibility testing, using a team of professional matchmakers, psychologists, and the contestants' family, friends, and exes. An ideal match for each person will be selected - the catch is that the results are not revealed. The singles will begin their quest to find their perfect match in the house. If the entire group succeeds in finding their matches during the season, they'll walk away not only with love, but their share of one million dollars. All 10 couples must match, or they'll all go home without the cash!" }, { "title": "Friends", "image": "https://static.tvmaze.com/uploads/images/original_untouched/41/104565.jpg", "desc": "Six young (20-something) people from New York City (Manhattan), on their own and struggling to survive in the real world, find the companionship, comfort and support they get from each other to be the perfect antidote to the pressures of life.This average group of buddies goes through massive mayhem, family trouble, past and future romances, fights, laughs, tears and surprises as they learn what it really means to be a friend." }, { "title": "Everwood", "image": "https://static.tvmaze.com/uploads/images/original_untouched/81/204375.jpg", "desc": "As a world-class neurosurgeon, Dr. Andrew Brown is a hero. As a father, he's a zero. But that is changing. Tragedy makes him a single parent to his two children. And as the first act of his new life, Andy leaves Manhattan and moves his family to Everwood, the tiny Colorado town where big dreams can grow." }] };

        const createMoviesWithReviews = (sourceList, categoryName, startId) => {
            return sourceList.map((baseItem, i) => {
                // 4.5 ile 10 arasında rating
                const baseRating = (Math.random() * (10 - 4.5) + 4.5).toFixed(1);

                const reviews = [];
                // Popülerlik durumuna göre 20 ile 100 arasında yorum üret (Tümüyle farklı isimlerle)
                const numReviews = Math.floor(Math.random() * (100 - 20 + 1)) + 20;

                const catCommentsPool = catComments[categoryName] || catComments["K-Film"];

                for (let j = 0; j < numReviews; j++) {
                    const reviewRating = Math.floor(Math.random() * 10) + 1; // 1 ile 10 arası

                    let text = "";
                    if (reviewRating >= 8) {
                        text = catCommentsPool.pos[Math.floor(Math.random() * catCommentsPool.pos.length)];
                    } else if (reviewRating >= 5) {
                        text = catCommentsPool.neu[Math.floor(Math.random() * catCommentsPool.neu.length)];
                    } else {
                        text = catCommentsPool.neg[Math.floor(Math.random() * catCommentsPool.neg.length)];
                    }

                    reviews.push({
                        id: Date.now() + startId + j + i * 100,
                        author: getDynamicName(),
                        text: text,
                        rating: reviewRating
                    });
                }

                reviews.sort(() => Math.random() - 0.5);

                const cleanDesc = baseItem.desc ? baseItem.desc.substring(0, 300) + (baseItem.desc.length > 300 ? "..." : "") : "Muazzam bir yapım.";

                return {
                    id: `${startId}_${i}`,
                    title: baseItem.title,
                    image: baseItem.image,
                    category: categoryName,
                    rating: parseFloat(baseRating),
                    description: cleanDesc,
                    reviews
                };
            });
        };

        const kFilmsData = createMoviesWithReviews(rawData.kflm, "K-Film", "kflm");
        const animationData = createMoviesWithReviews(rawData.anim, "Animasyon", "anim");
        const horrorData = createMoviesWithReviews(rawData.hor, "Korku", "hor");
        const comedyData = createMoviesWithReviews(rawData.com, "Komedi", "com");
        const romanceData = createMoviesWithReviews(rawData.rom, "Romantik", "rom");

        const allMovies = [...kFilmsData, ...animationData, ...horrorData, ...comedyData, ...romanceData];

        // ============================================================================
